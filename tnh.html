<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Hóa học</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .timer { font-size: 22px; font-weight: bold; color: #d9534f; }
        .question-text { font-size: 19px; font-weight: 600; margin-bottom: 20px; min-height: 50px; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 16px; position: relative; }
        .option:hover { background-color: #f8f9fa; border-color: #007bff; }
        .option.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .option.wrong { background-color: #f8d7da; border-color: #dc3545; color: #721c24; opacity: 0.8; }
        .msg { height: 30px; margin-top: 15px; font-weight: bold; font-size: 16px; text-align: center; }
        .msg.success { color: #28a745; }
        .msg.error { color: #dc3545; }
        .result-box { display: none; text-align: center; }
        .btn-retry { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .btn-retry:hover { background-color: #0056b3; }
        .progress { margin-top: 20px; font-size: 14px; color: #666; text-align: right; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-section">
        <div class="header">
            <h2 style="margin:0; font-size: 20px;">Trắc nghiệm Hóa học</h2>
            <div class="timer" id="timer">50:00</div>
        </div>

        <div id="question-container">
            <div class="question-text" id="q-text"></div>
            <div class="options" id="q-options"></div>
            <div class="msg" id="q-msg"></div>
        </div>

        <div class="progress" id="progress">Câu: 1 / 85</div>
    </div>

    <div id="result-section" class="result-box">
        <h2 style="color: #28a745;">Hoàn thành bài thi!</h2>
        <p style="font-size: 18px;">Số câu trả lời đúng: <strong id="res-correct"></strong> / 85</p>
        <p style="font-size: 24px;">Tổng điểm: <strong id="res-score"></strong> / 10</p>
        <button class="btn-retry" onclick="window.location.href='index.html'">Làm lại</button>
    </div>
</div>

<script>
    // Dữ liệu 85 câu hỏi giữ nguyên nội dung của bạn
    const quizData = [
        { q: "Dãy kim loại nào sau đây thuộc loại kim loại chuyển tiếp thứ nhất?", a: ["Co, V, K.", "Fe, Sc, Al.", "Cr, Mn, Ni.", "Cu, Zn, Ag."], c: 2 },
        { q: "Trong quá trình Solvay, ở giai đoạn tạo thành NaHCO3 tồn tại cân bằng... Khi làm lạnh dung dịch, muối bị tách ra là", a: ["NaHCO3.", "NH4Cl.", "NaCl.", "NH4HCO3."], c: 0 },
        { q: "Tính dẻo, tính dẫn điện, tính dẫn nhiệt và ánh kim của kim loại đều do thành phần nào gây ra?", a: ["Cation kim loại.", "Hạt proton tự do.", "Hạt neutron tự do.", "Hạt electron tự do."], c: 3 },
        { q: "Cấu hình electron lớp ngoài cùng của nguyên tử Na (chu kì 3, nhóm IA) là", a: ["3s23p5.", "3s2.", "3s1.", "3s23p1."], c: 2 },
        { q: "Hai kim loại thường được dùng làm dây dẫn điện là", a: ["đồng và nhôm.", "đồng và tungsten.", "nhôm và sắt.", "kẽm và nhôm."], c: 0 },
        { q: "Điện phân dung dịch NaCl (điện cực trơ, không màng ngăn) thu được dung dịch tẩy màu là do tạo ra", a: ["CuSO4.", "NaCl.", "K2SO4.", "AgNO3."], c: 1 },
        { q: "Đặc điểm nào dưới đây không phải của nước cứng?", a: ["Làm tăng tính acid, gây ngộ độc.", "Giảm tác dụng xà phòng.", "Tắc ống dẫn nước nóng.", "Giảm mùi vị thực phẩm."], c: 0 },
        { q: "Xỉ trong quá trình luyện kim thường có đặc điểm là", a: ["Khối lượng riêng nhỏ hơn kim loại.", "Dễ nóng chảy.", "Dễ bay hơi.", "Có nhiều độc tính."], c: 0 },
        { q: "Phương pháp điều chế vàng (Au) từ quặng theo sơ đồ hòa tan phức cyanide là", a: ["Thủy luyện.", "Nhiệt luyện.", "Điện phân nóng chảy.", "Điện phân dung dịch."], c: 0 },
        { q: "Ống nghiệm chứa Zn + H2SO4, thêm CuSO4 khí thoát nhanh hơn do", a: ["Tốc độ như nhau.", "CuSO4 là xúc tác.", "Ăn mòn điện hóa học.", "Ăn mòn hóa học."], c: 2 },
        { q: "Nồng độ mol ion Ca2+ trong dd bão hoà Ca(OH)2 ở 20°C (S=0,173) gần nhất là", a: ["1,730.", "0,940.", "0,023.", "0,047."], c: 2 },
        { q: "Điện phân nóng chảy muối chloride kim loại kiềm thổ, quá trình tại cathode là", a: ["M → M+ + 1e.", "M+ + 1e → M.", "M → M2+ + 2e.", "M2+ + 2e → M."], c: 3 },
        { q: "Sắt sản xuất nam châm dựa trên tính chất", a: ["Dẫn điện.", "Dẫn nhiệt.", "Tính dẻo.", "Tính nhiễm từ."], c: 3 },
        { q: "So với BaSO4, CaSO4 có đặc điểm", a: ["Khó nhiệt phân.", "Khó thuỷ phân.", "Dễ kết tủa.", "Dễ tan hơn."], c: 3 },
        { q: "Phát biểu SAI về tinh thể kim loại", a: ["Có cation và electron tự do.", "Cation chuyển động tự do.", "Cation và electron phân bố trật tự nhất định.", "Trung hòa về điện."], c: 2 },
        { q: "Hợp kim làm thân vỏ máy bay là", a: ["Duralumin.", "Đồng thau.", "Đồng thiếc.", "Manganin."], c: 0 },

        { q: "Nhiệt độ nóng chảy nhóm IA từ Li đến Cs", a: ["Tăng dần.", "Không đổi.", "Không quy luật.", "Giảm dần."], c: 3 },
        { q: "Số phát biểu ĐÚNG về Solvay: (a) tháp carbonate; (b) kết tủa NaHCO3; (c) tỏa nhiệt; (d) quay vòng CO2/NH3.", a: ["1.", "3.", "2.", "4."], c: 2 },
        { q: "Nước cứng chứa nhiều ion", a: ["Ca2+ và Mg2+.", "Cl– và SO42-.", "HCO3- và Cl–.", "Na+ và K+."], c: 0 },
        { q: "Thứ tự hoạt động hóa học giảm dần (X: điện phân, Y: nhiệt phân, Z: khử C)", a: ["X, Z, Y.", "Y, Z, X.", "X, Y, Z.", "Z, Y, X."], c: 0 },
        { q: "Điện phân NaCl nóng chảy, cathode thu được", a: ["HCl.", "Cl2.", "Na.", "NaOH"], c: 2 },
        { q: "Cực dương gọi là (1), cực âm gọi là (2)", a: ["(1): anode, (2): cathode.", "(1): cathode, (2): anode.", "Cả hai là anode.", "Cả hai là cathode."], c: 0 },
        { q: "Thành phần không có trong mạng tinh thể kim loại", a: ["Ion kim loại.", "Electron.", "Nguyên tử.", "Anion gốc acid."], c: 3 },
        { q: "Ở pH=7, kim loại tan trong nước có thế điện cực chuẩn", a: ["> -0,413 V.", "< -0,413 V.", "> -0,826 V.", "< -0,826 V."], c: 1 },
        { q: "Phản xạ ánh sáng tạo nên tính", a: ["Dẫn điện.", "Ánh kim.", "Tính dẻo.", "Dẫn nhiệt."], c: 1 },
        { q: "Thép không gỉ chứa thêm", a: ["Mn, Mg.", "Mg, Al.", "Cr, Ni.", "Li, Ti."], c: 2 },
        { q: "Tôn gỉ nhanh ở vị trí đinh thép do", a: ["Tiếp xúc nước mưa.", "Đinh là anode.", "Carbon trong đinh là cathode.", "Thép không đồng nhất."], c: 0 },
        { q: "Nhôm KHÔNG dùng làm", a: ["Dây cao thế.", "Giấy gói thực phẩm.", "Vật liệu xây dựng.", "Mỏ neo tàu biển."], c: 3 },
        { q: "Kim loại kiềm là", a: ["Sr.", "Mg.", "Cr.", "Cs."], c: 3 },
        { q: "Hóa chất tan dầu mỡ ống bếp", a: ["Nước vôi.", "Giấm.", "Baking soda.", "Soda."], c: 3 },
        { q: "Đặc điểm chung kim loại kiềm", a: ["Cấu tạo khá rỗng.", "Liên kết mạnh.", "Nhiệt độ nóng chảy cao.", "Nặng hơn dầu hỏa."], c: 0 },
        { q: "Khử 1,6g oxide bằng CO được 1,12g rắn. Oxide là", a: ["FeO.", "Fe2O3.", "CuO.", "MgO."], c: 2 },
        { q: "Điện phân CuSO4 trơ, hiện tượng SAI là", a: ["Nhạt màu xanh.", "Khí 2 cực.", "Khí anode màu nâu đỏ.", "Đồng ở cathode."], c: 2 },
        { q: "Xảy ra phản ứng khi", a: ["Cu + NaCl.", "Al + MgCl2.", "Ag + FeSO4.", "Cu + AgNO3."], c: 3 },
        { q: "Phát biểu ĐÚNG về tách kim loại", a: ["Fe đẩy Cu khỏi CuSO4.", "Zn từ ZnO bằng nhiệt luyện.", "Mg từ MgCl2 bằng điện phân dd.", "CO khử được Al2O3."], c: 1 },
        { q: "Nước muối sinh lí 0,9% chứa", a: ["NaCl.", "NaClO.", "Na2SO4.", "NaNO3."], c: 0 },
        { q: "Phản ứng bột nở làm bánh xốp", a: ["+ Ca(OH)2.", "Nhiệt phân NaHCO3.", "+ HCl.", "Tạo NaHCO3."], c: 1 },
        { q: "Điện phân nóng chảy KCl, tại cathode", a: ["Oxi hóa K+.", "Oxi hóa Cl-.", "Khử K+.", "Khử Cl-."], c: 2 },
        { q: "Kim loại cứng nhất", a: ["Cr.", "Al.", "Mg.", "Na."], c: 0 },
        { q: "Ăn mòn điện hóa sắt khi", a: ["Sắt + H2SO4 loãng.", "Gang + HCl.", "Sắt + Cl2 khô.", "Sắt + Lưu huỳnh nung."], c: 1 },
        { q: "Kim loại tan trong acid loãng có thế điện cực", a: ["> 0V.", "< 0V.", "> -0,413V.", "< -0,413V."], c: 1 },
        { q: "Tính chất vật lí chung kim loại", a: ["Dẻo, dẫn điện/nhiệt, ánh kim.", "Mềm, dẫn điện.", "Cứng, dẫn điện.", "Nhiệt độ nóng chảy cao."], c: 0 },
        { q: "Kim loại trong dural và thép 304 là", a: ["Al & Mg.", "Al & Fe.", "Mg & Fe.", "Zn & Fe."], c: 1 },
        { q: "Ăn mòn kim loại là", a: ["Phá hủy bởi chất điện li.", "Chỉ là ăn mòn điện hóa.", "Diễn ra trong dd.", "Oxi hóa do môi trường."], c: 3 },
        { q: "Phát biểu ĐÚNG về tinh thể kim loại", a: ["Cation & electron cùng tự do.", "Tương tác tĩnh điện ion/nguyên tử.", "Cation trật tự, electron tự do.", "Liên kết ion."], c: 2 },
        { q: "Cation M+ cấu hình 2s22p6. M là", a: ["Rb.", "Na.", "Li.", "K."], c: 1 },
        { q: "Bảo quản Na, K trong", a: ["Dầu hỏa.", "Phenol.", "Ethanol.", "Bình hút ẩm."], c: 0 },
        { q: "Tính chất SAI của kim loại kiềm", a: ["D thấp.", "Độ cứng thấp.", "Tnc thấp.", "Dẫn điện tốt hơn Cu."], c: 3 },
        { q: "Thủy luyện dùng kim loại mạnh khử ion trong", a: ["Muối khan.", "Dung dịch muối.", "Oxide.", "Hydroxide."], c: 1 },
        { q: "Điện phân H2SO4 0,01M, nhận xét SAI", a: ["Anode O2, cathode H2.", "m H2SO4 không đổi.", "C% H2SO4 không đổi.", "pH giảm."], c: 2 },
        { q: "Tinh chế đồng, tại anode", a: ["Cu -> Cu2+ + 2e.", "Cu2+ + 2e -> Cu.", "Nước tạo O2.", "H+ tạo H2."], c: 0 },
        { q: "Pha 500ml nước muối 0,9% (d=1,0046) cần NaCl", a: ["4,521g.", "5,421g.", "6,986g.", "15,068g."], c: 0 },
        { q: "Nguyên liệu sản xuất soda Solvay", a: ["Đá vôi & NaCl.", "NaCl, NH3, CO2.", "NaOH & CO2.", "NaCl & H2CO3."], c: 0 },
        { q: "Điện phân Cu(NO3)2, tại anode", a: ["Nước tạo O2.", "Nước tạo H2.", "Cu tạo Cu2+.", "Cu2+ tạo Cu."], c: 0 },
        { q: "Cation điện phân trước ở cathode", a: ["Cu2+.", "Ag+.", "H+.", "Fe2+."], c: 1 },
        { q: "Hợp kim là vật liệu", a: ["Nấu chảy hỗn hợp.", "Chứa kim loại cơ bản & thành phần khác.", "Hỗn hợp nóng chảy.", "Hỗn hợp nguội."], c: 1 },
        { q: "Thành phần hematite", a: ["Fe3O4.", "Fe2O3.", "FeO.", "Phức sắt."], c: 1 },
        { q: "Vàng bạc làm trang sức do", a: ["Quý hiếm.", "Ánh kim, dẻo, bền oxi hóa.", "Dễ dát mỏng.", "Nhẹ."], c: 1 },
        { q: "Nam châm tách được", a: ["Al.", "Thép.", "Cu.", "Zn."], c: 1 },
        { q: "Nguyên tử có 3 electron lớp ngoài cùng", a: ["Na.", "Al.", "Si.", "Mg."], c: 1 },
        { q: "Phát biểu ĐÚNG về cấu tạo/liên kết kim loại", a: ["(1)(2)(3).", "(1)(2)(4).", "(1)(2)(3)(4).", "(2)(3)(4)."], c: 2 },
        { q: "Dãy Li, Na, Al, Ca, K, Rb có bao nhiêu kim loại kiềm?", a: ["1.", "2.", "3.", "4."], c: 3 },
        { q: "Mức độ phản ứng nước tăng dần", a: ["K, Na, Li.", "Na, K, Li.", "Li, Na, K.", "K, Li, Na."], c: 2 },
        { q: "Nhận định SAI về kim loại IA", a: ["Khử mạnh nhất.", "Thế điện cực âm nhất.", "Bán kính lớn nhất.", "Liên kết mạnh nhất."], c: 3 },
        { q: "Z không tan gồm (Y từ X + CO dư, NaOH dư)", a: ["MgO, Fe, Cu.", "Mg, Fe, Cu.", "MgO, Fe3O4, Cu.", "Mg, Al, Fe, Cu."], c: 0 },
        { q: "Đặc điểm Solvay", a: ["Áp suất cao.", "Oxi hóa khử.", "NaHCO3 tan kém.", "Trao đổi khí."], c: 2 },
        { q: "Kim loại không tan trong HCl", a: ["Zn.", "Ag.", "Mg.", "K."], c: 1 },
        { q: "Phát biểu SAI về chống ăn mòn", a: ["Phủ bề mặt.", "Điện hóa.", "Quấn kẽm bảo vệ kẽm.", "Bạc đen là hóa học."], c: 2 },
        { q: "Hợp chất A lửa vàng, +HCl tạo khí đục nước vôi", a: ["K2CO3.", "NaNO3.", "CaCO3.", "Muối Na carbonate."], c: 3 },
        { q: "Ứng dụng KHÔNG của soda", a: ["Mềm nước.", "Bột giấy.", "Tẩy dầu mỡ.", "Sản xuất NaHCO3."], c: 3 },
        { q: "Dãy điện phân dung dịch được", a: ["Mg, Cu, Zn.", "Fe, Al, Cr.", "Ag, Cu, Fe.", "Au, Ag, Ca."], c: 2 },
        { q: "Thùng phuy thép đựng được", a: ["HCl đặc.", "H2SO4 loãng.", "H2SO4 đặc.", "HNO3 loãng."], c: 2 },
        { q: "Cấu hình KHÔNG của kim loại", a: ["[Ne]3s23p3.", "[Ne]3s2.", "[Ar]3d34s2.", "[Ar]3d64s2."], c: 0 },
        { q: "Zn tách được dãy ion", a: ["Sn2+, Pb2+, Cu2+.", "Mg2+, Pb2+, Cu2+.", "Pb2+, Ag+, Al3+.", "Ag+, Cu2+, Na+."], c: 0 },
        { q: "Kim loại có tính vật lí chung do", a: ["Mạng tinh thể.", "Electron tự do.", "Ít electron hóa trị.", "Năng lượng ion hóa nhỏ."], c: 1 },
        { q: "Tungsten làm dây tóc do", a: ["Dẫn nhiệt.", "Tỷ trọng.", "Dẻo.", "Tnc cao."], c: 3 },
        { q: "Tôn bị ăn mòn điện hóa thì", a: ["Zn cathode.", "Fe cathode.", "Zn anode bị oxi hóa.", "Fe anode."], c: 2 },
        { q: "Cation điện phân trước tại cathode", a: ["Ni2+.", "Cu2+.", "Mg2+.", "Ag+."], c: 3 },
        { q: "Kim loại kiềm là", a: ["Ba.", "Li.", "Al.", "Cu."], c: 1 },
        { q: "Mạng tinh thể kim loại kiềm", a: ["Lập phương tâm khối.", "Tâm diện.", "Lục phương.", "Tùy loại."], c: 0 },
        { q: "Không còn ion Na+ khi", a: ["Nhiệt phân NaHCO3.", "Điện phân dd NaOH.", "ĐPNC NaCl.", "Điện phân dd NaCl."], c: 2 },
        { q: "Số phát biểu ĐÚNG về hợp kim", a: ["2.", "3.", "5.", "4."], c: 3 },
        { q: "Khối lượng Ag thu được (kg)", a: ["2,75.", "4,32.", "2,16.", "3,24."], c: 1 },
        { q: "NaHCO3 trong thuốc dạ dày đóng vai trò", a: ["Acid.", "Base.", "Lưỡng tính.", "Trung tính."], c: 1 }
    ];

    let currentIdx = 0;
    let timer = 50 * 60;
    const labels = ['A', 'B', 'C', 'D'];

    function startTimer() {
        const tInterval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timer <= 0) {
                clearInterval(tInterval);
                finish();
            }
            timer--;
        }, 1000);
    }

    function renderQuestion() {
        const data = quizData[currentIdx];
        document.getElementById('q-text').innerText = `Câu ${currentIdx + 1}: ${data.q}`;
        const optionsHtml = data.a.map((opt, i) => `
            <div class="option" onclick="check(${i}, this)">
                <strong>${labels[i]}.</strong> ${opt}
            </div>
        `).join('');
        document.getElementById('q-options').innerHTML = optionsHtml;
        document.getElementById('q-msg').innerHTML = ''; // Reset thông báo
        document.getElementById('progress').innerText = `Câu: ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('q-options').classList.remove('disabled');
    }

    function check(i, el) {
        // Ngăn chặn bấm nhiều lần khi đang chờ chuyển câu
        if (document.getElementById('q-options').classList.contains('disabled')) return;
        if (el.classList.contains('wrong') || el.classList.contains('correct')) return;
        
        const correctIdx = quizData[currentIdx].c;
        if (i === correctIdx) {
            el.classList.add('correct');
            document.getElementById('q-options').classList.add('disabled');
            document.getElementById('q-msg').innerHTML = '<span class="success">Chính xác! Đang chuyển câu...</span>';
            
            // Chờ đúng 2 giây (2000ms) mới chuyển câu
            setTimeout(() => {
                currentIdx++;
                if (currentIdx < quizData.length) renderQuestion();
                else finish();
            }, 1000);
        } else {
            el.classList.add('wrong');
            document.getElementById('q-msg').innerHTML = '<span class="error">Sai rồi, hãy chọn lại!</span>';
        }
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('res-correct').innerText = currentIdx;
        document.getElementById('res-score').innerText = ((currentIdx / 85) * 10).toFixed(2);
    }

    startTimer();
    renderQuestion();
</script>

</body>
</html>
