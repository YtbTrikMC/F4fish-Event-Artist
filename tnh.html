<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Hóa học - NTT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .timer { font-size: 22px; font-weight: bold; color: #d9534f; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.6; white-space: pre-wrap; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .option:hover { background-color: #f8f9fa; border-color: #007bff; }
        .option.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .option.wrong { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        .msg { height: 30px; margin-top: 15px; font-weight: bold; font-size: 16px; text-align: center; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .result-box { display: none; text-align: center; }
        .btn-retry { background-color: #007bff; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; }
        .progress { margin-top: 20px; font-size: 14px; color: #666; text-align: right; }
        .disabled { pointer-events: none; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        table, th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-section">
        <div class="header">
            <h2 style="margin:0; font-size: 20px;">Hệ Thống Ôn Tập - Trắc Nghiệm Hóa</h2>
            <div class="timer" id="timer">50:00</div>
        </div>

        <div id="question-container">
            <div class="question-text" id="q-text"></div>
            <div class="options" id="q-options"></div>
            <div class="msg" id="q-msg"></div>
        </div>

        <div class="progress" id="progress">Câu: 1 / 85</div>
    </div>

    <div id="result-section" class="result-box">
        <h2 style="color: #28a745;">Hoàn thành bài thi!</h2>
        <p style="font-size: 18px;">Số câu đúng (lần đầu): <strong id="res-correct"></strong> / 85</p>
        <p style="font-size: 24px;">Tổng điểm: <strong id="res-score"></strong> / 10</p>
        <button class="btn-retry" onclick="window.location.href='index.html'">Quay lại trang chủ</button>
    </div>
</div>

        { q: "Hợp kim là vật liệu kim loại:", a: ["nóng chảy hỗn hợp cơ bản.", "chứa kim loại cơ bản và thành phần khác.", "hỗn hợp nóng chảy để nguội.", "hỗn hợp kim loại/phi kim nóng chảy."], c: 1 },
        { q: "Thành phần chính khoáng vật hematite:", a: ["Fe3O4.", "Fe2O3.", "FeO.", "Fe(OH)CO3."], c: 1 },
        { q: "Bạc và vàng làm đồ trang sức vì:", a: ["là kim loại quý hiếm.", "ánh kim, dẻo, không bị oxi hóa môi trường.", "dễ dát mỏng kéo sợi.", "ánh kim, dẻo và nhẹ."], c: 1 },
        { q: "Dùng nam châm tách riêng phế liệu nào?", a: ["aluminium.", "thép.", "copper.", "zinc."], c: 1 },
        { q: "Nguyên tử có 3 electron lớp ngoài cùng:", a: ["Na (Z=11).", "Al (Z=13).", "Si (Z=14).", "Mg (Z=12)."], c: 1 },
        { q: "Số phát biểu ĐÚNG về kim loại/tinh thể:\n(1) Nhóm B là kim loại.\n(2) Rắn có cấu tạo tinh thể.\n(3) Bán kính > phi kim cùng chu kì.\n(4) Lực hút e tự do và ion dương.", a: ["(1), (2), (3).", "(1), (2), (4).", "(1), (2), (3), (4).", "(2), (3), (4)."], c: 2 },
        { q: "Dãy Li, Na, Al, Ca, K, Rb. Số kim loại kiềm là:", a: ["1.", "2.", "3.", "4."], c: 3 },
        { q: "Mức độ phản ứng với nước tăng dần:", a: ["K, Na, Li.", "Na, K, Li.", "Li, Na, K.", "K, Li, Na."], c: 2 },
        { q: "So sánh IA với chu kì, nhận định SAI:", a: ["Tính khử mạnh nhất.", "Thế điện cực âm nhất.", "Bán kính lớn nhất.", "Liên kết kim loại mạnh nhất."], c: 3 },
        { q: "Z không tan gồm (Y từ X + CO dư, NaOH dư):", a: ["MgO, Fe, Cu.", "Mg, Fe, Cu.", "MgO, Fe3O4, Cu.", "Mg, Al, Fe, Cu."], c: 0 },
        { q: "Đặc điểm phương pháp Solvay:", a: ["Áp suất cao đẩy Cl-.", "Phản ứng oxi hóa khử.", "NaHCO3 độ tan kém dễ kết tinh.", "Phản ứng trao đổi giảm mol khí."], c: 2 },
        { q: "Kim loại không tan trong dd HCl:", a: ["Zn.", "Ag.", "Mg.", "K."], c: 1 },
        { q: "Phát biểu SAI về chống ăn mòn:", a: ["Sơn, mạ là phủ bề mặt.", "Nối với kim loại mạnh hơn là điện hóa.", "Quấn kẽm quanh đinh sắt bảo vệ kẽm.", "Bạc đen là ăn mòn hóa học."], c: 2 },
        { q: "A lửa vàng, +HCl tạo khí đục nước vôi. A là:", a: ["K2CO3.", "NaNO3.", "CaCO3.", "Na2CO3 hoặc NaHCO3."], c: 3 },
        { q: "Ứng dụng KHÔNG của sodium carbonate:", a: ["Làm mềm nước.", "Nguyên liệu bột giấy.", "Tẩy dầu mỡ ống bếp.", "Sản xuất NaHCO3."], c: 3 },
        { q: "Điện phân dd muối điều chế dãy:", a: ["Mg, Cu, Zn.", "Fe, Al, Cr.", "Ag, Cu, Fe.", "Au, Ag, Ca."], c: 2 },
        { q: "Thùng phuy thép đựng được dd nào ở nhiệt độ thường?", a: ["HCl đặc.", "H2SO4 loãng.", "H2SO4 đặc.", "HNO3 loãng."], c: 2 },
        { q: "Cấu hình electron KHÔNG phải của kim loại:", a: ["[Ne]3s23p3.", "[Ne]3s2.", "[Ar]3d34s2.", "[Ar]3d64s2."], c: 0 },
        { q: "Dùng kẽm tách được dãy ion riêng biệt nào?", a: ["Sn2+, Pb2+, Cu2+.", "Mg2+, Pb2+, Cu2+.", "Pb2+, Ag+, Al3+.", "Ag+, Cu2+, Na+."], c: 0 },
        { q: "Đơn chất kim loại có tính chất vật lí chung do:", a: ["cấu trúc mạng tinh thể.", "các electron tự do.", "ít electron hóa trị.", "năng lượng ion hóa nhỏ."], c: 1 },
        { q: "Tungsten (W) làm dây tóc bóng đèn nhờ:", a: ["Tính dẫn nhiệt.", "Tỉ trọng nhỏ.", "Tính dẻo.", "Nhiệt độ nóng chảy cao."], c: 3 },
        { q: "Tôn bị ăn mòn điện hóa trong không khí ẩm thì:", a: ["Zn là cathode bị oxi hóa.", "Fe là cathode bị oxi hóa.", "Zn là anode bị oxi hóa.", "Fe là anode bị oxi hóa."], c: 2 },
        { q: "Điện phân phân đoạn Ag+, Cu2+, Ni2+, Mg2+. Cation điện phân TRƯỚC là:", a: ["Ni2+.", "Cu2+.", "Mg2+.", "Ag+."], c: 3 },
        { q: "Kim loại nào sau đây là kim loại kiềm?", a: ["Ba.", "Li.", "Al.", "Cu."], c: 1 },
        { q: "Mạng tinh thể kim loại kiềm là:", a: ["lập phương tâm khối.", "lập phương tâm diện.", "lục phương.", "tùy bản chất nguyên tố."], c: 0 },
        { q: "Trường hợp nào không còn tồn tại ion Na+?", a: ["Nhiệt phân NaHCO3.", "Điện phân dd NaOH.", "Điện phân nóng chảy NaCl.", "Điện phân dd NaCl."], c: 2 },
        { q: "Số phát biểu ĐÚNG về hợp kim:\n(a) Dùng phổ biến hơn kim loại.\n(b) Tnc luôn cao hơn B.\n(c) Tính hóa học tương tự thành phần.\n(d) Có thể cứng hơn kim loại tạo nó.\n(e) Khó bị oxi hóa hơn.", a: ["2.", "3.", "5.", "4."], c: 3 },
        { q: "Sử dụng 1,50 kg Zn khử phức Ag thu được 4,52 kg rắn (Ag và Zn dư). Ag thu được là bao nhiêu kg?", a: ["2,75.", "4,32.", "2,16.", "3,24."], c: 1 },
        { q: "Trong phản ứng NaHCO3 thuốc dạ dày, nó thể hiện tính chất:", a: ["acid.", "base.", "lưỡng tính.", "trung tính."], c: 1 }
    ];

    let currentIdx = 0;
    let timer = 50 * 60;
    let score = 0;
    let hasFailedThisQuestion = false; // Biến kiểm tra xem câu này đã từng chọn sai chưa
    const labels = ['A', 'B', 'C', 'D'];

    function startTimer() {
        const tInterval = setInterval(() => {
            let m = Math.floor(timer / 60);
            let s = timer % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (timer <= 0) {
                clearInterval(tInterval);
                finish();
            }
            timer--;
        }, 1000);
    }

    function renderQuestion() {
        hasFailedThisQuestion = false; // Reset trạng thái cho câu mới
        const data = quizData[currentIdx];
        document.getElementById('q-text').innerText = `Câu ${currentIdx + 1}. ${data.q}`;
        const optionsHtml = data.a.map((opt, i) => `
            <div class="option" onclick="check(${i}, this)">
                <strong>${labels[i]}.</strong> ${opt}
            </div>
        `).join('');
        document.getElementById('q-options').innerHTML = optionsHtml;
        document.getElementById('q-msg').innerHTML = '';
        document.getElementById('progress').innerText = `Câu: ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('q-options').classList.remove('disabled');
    }

    function check(i, el) {
        if (document.getElementById('q-options').classList.contains('disabled')) return;
        if (el.classList.contains('wrong') || el.classList.contains('correct')) return;
        
        const correctIdx = quizData[currentIdx].c;
        if (i === correctIdx) {
            el.classList.add('correct');
            document.getElementById('q-options').classList.add('disabled');
            document.getElementById('q-msg').innerHTML = '<span class="success">Chính xác! Đang chuyển câu...</span>';
            
            // Chỉ cộng điểm nếu chưa từng chọn sai ở câu này
            if (!hasFailedThisQuestion) {
                score++;
            }
            
            setTimeout(() => {
                currentIdx++;
                if (currentIdx < quizData.length) renderQuestion();
                else finish();
            }, 1000);
        } else {
            el.classList.add('wrong');
            hasFailedThisQuestion = true; // Đánh dấu đã chọn sai, không được tính điểm câu này nữa
            document.getElementById('q-msg').innerHTML = '<span class="error">Sai rồi, hãy chọn lại để tiếp tục!</span>';
        }
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('res-correct').innerText = score;
        document.getElementById('res-score').innerText = ((score / 85) * 10).toFixed(2);
    }

    window.onload = () => {
        startTimer();
        renderQuestion();
    };
</script>
