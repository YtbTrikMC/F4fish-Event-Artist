        { q: "Cấu hình electron nào không phải của kim loại?", a: ["[Ne]3s23p3.", "[Ne]3s2.", "[Ar]3d34s2.", "[Ar]3d64s2."], c: 0 },
        { q: "Kẽm tách được dãy ion nào?", a: ["Sn2+, Pb2+, Cu2+.", "Mg2+, Pb2+, Cu2+.", "Pb2+, Ag+, Al3+.", "Ag+, Cu2+, Na+."], c: 0 },
        { q: "Kim loại có tính chất vật lí chung do", a: ["cấu trúc mạng tinh thể.", "có electron tự do.", "ít electron hóa trị.", "năng lượng ion hóa nhỏ."], c: 1 },
        { q: "Tungsten làm dây tóc bóng đèn dựa trên", a: ["Dẫn nhiệt.", "Tỉ trọng.", "Tính dẻo.", "Nhiệt độ nóng chảy cao."], c: 3 },
        { q: "Tôn (sắt tráng kẽm) bị ăn mòn điện hóa thì", a: ["kẽm cathode bị oxi hóa.", "sắt cathode bị oxi hóa.", "kẽm anode bị oxi hóa.", "sắt anode bị oxi hóa."], c: 2 },
        { q: "Điện phân dung dịch Ag+, Cu2+, Ni2+, Mg2+. Cation nào điện phân trước?", a: ["Ni2+.", "Cu2+.", "Mg2+.", "Ag+."], c: 3 },
        { q: "Kim loại nào sau đây là kim loại kiềm?", a: ["Ba.", "Li.", "Al.", "Cu."], c: 1 },
        { q: "Kim loại kiềm có cấu trúc mạng tinh thể", a: ["lập phương tâm khối.", "lập phương tâm diện.", "lục phương.", "tùy nguyên tố."], c: 0 },
        { q: "Trường hợp nào không còn tồn tại ion Na+?", a: ["Nhiệt phân NaHCO3.", "Điện phân dd NaOH.", "Điện phân nóng chảy NaCl.", "Điện phân dd NaCl."], c: 2 },
        { q: "Số phát biểu đúng (a) Hợp kim phổ biến; (b) Tnc hợp kim luôn > B; (c) Tính chất hóa học tương tự; (d) Cứng hơn; (e) Khó oxi hóa hơn.", a: ["2.", "3.", "5.", "4."], c: 3 },
        { q: "Dùng 1,5kg Zn khử Ag+ thu được 4,52kg rắn Ag và Zn dư. Ag thu được là", a: ["2,75.", "4,32.", "2,16.", "3,24."], c: 1 },
        { q: "Trong phản ứng với acid dạ dày, NaHCO3 thể hiện tính chất", a: ["acid.", "base.", "lưỡng tính.", "trung tính."], c: 1 }
    ];

    let currentQuestion = 0;
    let time = 50 * 60;
    const timerEl = document.getElementById('timer');
    const quizContainer = document.getElementById('quiz-container');
    const progressEl = document.getElementById('progress');

    function startTimer() {
        const interval = setInterval(() => {
            let minutes = Math.floor(time / 60);
            let seconds = time % 60;
            timerEl.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            if (time <= 0) {
                clearInterval(interval);
                alert("Hết giờ!");
                window.location.href = "index.html";
            }
            time--;
        }, 1000);
    }

    function loadQuestion() {
        quizContainer.innerHTML = '';
        const data = quizData[currentQuestion];
        const qDiv = document.createElement('div');
        qDiv.className = 'question-box active';

        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = `Câu ${currentQuestion + 1}: ${data.q}`;
        qDiv.appendChild(qText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        data.a.forEach((opt, index) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'option';
            optDiv.innerText = opt;
            optDiv.onclick = () => checkAnswer(index, optDiv);
            optionsDiv.appendChild(optDiv);
        });

        qDiv.appendChild(optionsDiv);
        quizContainer.appendChild(qDiv);
        progressEl.innerText = `Câu hỏi: ${currentQuestion + 1} / ${quizData.length}`;
    }

    function checkAnswer(index, element) {
        const correctAnswer = quizData[currentQuestion].c;
        if (index === correctAnswer) {
            element.classList.add('correct');
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    loadQuestion();
                } else {
                    alert("Chúc mừng!Bạn đã hoàn thành 85 câu hỏi. Điểm của bạn là 10/10.");
                    window.location.href = "index.html";
                }
            }, 500);
        } else {
            element.classList.add('wrong');
            alert("Sai rồi! Chọn lại đáp án đúng mới được qua câu tiếp theo.");
        }
    }

    startTimer();
    loadQuestion();
</script>
