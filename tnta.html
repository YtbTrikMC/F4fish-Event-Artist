<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Tiếng Anh - Npc</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        #timer { position: fixed; top: 20px; right: 20px; background: var(--danger); color: white; padding: 12px 20px; border-radius: 30px; font-weight: bold; z-index: 1000; }
        
        .question-block { margin-bottom: 25px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; transition: 0.3s; }
        .question-text { font-weight: 600; margin-bottom: 15px; display: block; font-size: 1.05rem; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { border: 2px solid #e2e8f0; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; background: white; font-weight: 500; }
        
        /* Hiệu ứng đúng/sai lập tức */
        .opt.wrong { background: #fee2e2; border-color: var(--danger); color: var(--danger); pointer-events: none; }
        .opt.correct { background: #dcfce7; border-color: var(--success); color: var(--success); font-weight: bold; pointer-events: none; }
        .opt.disabled { pointer-events: none; opacity: 0.6; }

        .btn { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #1d4ed8; }
        
        #result-area { display: none; text-align: center; margin-top: 30px; padding: 30px; background: #f0fdf4; border-radius: 15px; border: 2px solid var(--success); }
        .btn-home { background: #64748b; color: white; padding: 12px 30px; text-decoration: none; display: inline-block; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="timer">45:00</div>

<div class="container">
    <h1 style="text-align:center; color: var(--primary)">LUYỆN TẬP TIẾNG ANH (35 CÂU)</h1>
    <p style="text-align:center; color: #64748b;"><i>Chọn đáp án đúng để hoàn thành từng câu hỏi</i></p>
    
    <div id="quiz-container"></div>
    
    <button class="btn" id="submit-btn" style="display:none;" onclick="showFinalResult()">NỘP BÀI & XEM KẾT QUẢ</button>

    <div id="result-area">
        <h2 id="score-text"></h2>
        <p id="comparison-text" style="font-style: italic; color: #166534;"></p>
        <a href="index.html" class="btn-home">Làm lại bài mới</a>
    </div>
</div>

<script>
    const questions = [
        { id: 1, q: "Question 1. Online courses allow learners to study at their own _________.", options: ["speed", "pace", "rate", "time"], correct: 1 },
        { id: 2, q: "Question 2. Virtual reality simulations offer _________ experiences, allowing users to interact with computer-made environments.", options: ["ready-made", "hands-on", "human-like", "spare"], correct: 1 },
        { id: 3, q: "Question 3. _______ provides flexibility for those who cannot attend traditional classes.", options: ["Self-motivation", "Distance learning", "Martial art", "Adult education"], correct: 1 },
        { id: 4, q: "Question 4. It may take employees quite a long time to ______ to the new working environment.", options: ["pursue", "socialize", "network", "adapt"], correct: 3 },
        { id: 5, q: "Question 5. __________ in the region has led to a decline in fish populations, so we need stricter conservation measures.", options: ["Deforestation", "Overfishing", "Forest clearance", "Captivity"], correct: 1 },
        { id: 6, q: "Question 6. Peter was bitterly disappointed at the test result, but I think he’ll soon _______ it.", options: ["get over", "put through", "make up", "turn into"], correct: 0 },
        { id: 7, q: "Question 7. The book I borrowed from the library was much ___________than I had expected.", options: ["much interested", "more interesting", "more interest", "less interestingly"], correct: 1 },
        { id: 8, q: "Question 8. We can get the home robot_________us with the household chores.", options: ["to help", "help", "helping", "helped"], correct: 0 },
        { id: 9, q: "Question 9. He talks to strangers __________ he knew them for years.", options: ["as", "like", "as if", "though"], correct: 2 },
        { id: 10, q: "Question 10. Robots are becoming more intelligent. They may take over some jobs.", options: ["Robots are becoming so intelligent that they may take over some jobs.", "Robots became intelligent because they take over some jobs.", "If robots become intelligent, they took over some jobs.", "Robots are intelligent although they may take over some jobs."], correct: 0 },
        { id: 11, q: "Question 11. Qualifications and _______ are two most important factors that help you get a good job.", options: ["politeness", "experience", "attention", "impression"], correct: 1 },
        { id: 12, q: "Question 12. To become successful in the increasingly competitive market, you have to _______ fashion knowledge.", options: ["put up with", "get through to", "keep up with", "look forward to"], correct: 2 },
        { id: 13, q: "Question 13. Smart robots are designed to _________ humans in doing dangerous tasks.", options: ["replace", "repeat", "reply", "require"], correct: 0 },
        { id: 14, q: "Question 14. __________ like newspapers and television are traditional sources of news.", options: ["Mass media", "Social media", "Fake news", "Digital media"], correct: 0 },
        { id: 15, q: "Question 15. Cutting down forests leads to serious environmental _________.", options: ["advantages", "benefits", "consequences", "solutions"], correct: 2 },
        { id: 16, q: "Question 16. Many efforts have been made to protect ____ nature.", options: ["danger", "dangerous", "endanger", "endangered"], correct: 3 },
        { id: 17, q: "Question 17. Forest clearance is _______ issue facing us.", options: ["more urgent than", "more urgent", "as urgent as", "the most urgent"], correct: 3 },
        { id: 18, q: "Question 18. I’m going to have the mechanic _________ my car tomorrow.", options: ["will be repaired", "repair", "repaired", "to be repaired"], correct: 1 },
        { id: 19, q: "Question 19. \"Are you going to the party tonight?\" he asked me.", options: ["if I was going / that night", "if was I going / tonight", "am I going / that night", "whether I am going / tonight"], correct: 0 },
        { id: 20, q: "Question 20. The water was too cold for me to swim in.", options: ["It was such cold water that I couldn’t swim in it.", "It was so cold a water that I couldn’t swim in it.", "It was such a cold water that I couldn’t swim in it.", "It was too cold water that I couldn’t swim in it."], correct: 0 },
        { id: 21, q: "Question 21. In the future, we might see more ______ of AI in every aspect of life.", options: ["applications", "applicable", "applicant", "apply"], correct: 0 },
        { id: 22, q: "Question 22. ________ is the existence of a wide variety of plant and animal species living in their natural environment.", options: ["Biodiversity", "Conservation", "Globe", "Individual"], correct: 0 },
        { id: 23, q: "Question 23. Almost half of the ________ are perfectly suitable for the vacancy.", options: ["employees", "competitors", "candidates", "applications"], correct: 2 },
        { id: 24, q: "Question 24. The host asked her ______________ tea or coffee.", options: ["whether she liked", "that she liked", "if she likes", "whether she like"], correct: 0 },
        { id: 25, q: "Question 25. Unemployment and poverty force people to engage in anti-social activities.", options: ["include", "engage", "take", "oppose"], correct: 1 },
        { id: 26, q: "Question 26. His teenage daughter can't ____ her moods, her music, and her constant demand for money.", options: ["keep up with", "go on with", "put up with", "put up to"], correct: 2 },
        { id: 27, q: "Question 27. I'll have a new dress ____ for my daughter.", options: ["making", "to make", "make", "made"], correct: 3 },
        { id: 28, q: "Question 28. ______, he would have been able to pass the exam.", options: ["If he studied more", "If he were studying more", "Studying more", "Had he studied more"], correct: 3 },
        { id: 29, q: "Question 29. The integration of _________ technology has helped improve user experience.", options: ["advanced", "real – time", "effortless", "self – driving"], correct: 0 },
        { id: 30, q: "Question 30. To………………the robot, the technician input specific commands.", options: ["activate", "analyse", "interact", "imitate"], correct: 0 },
        { id: 31, q: "Question 31. Students use the library's computers to get ……………………..to the Internet.", options: ["format", "limit", "income", "access"], correct: 3 },
        { id: 32, q: "Question 32. Tram Chim National Park is home _________ many rare and endangered species.", options: ["of", "to", "for", "with"], correct: 1 },
        { id: 33, q: "Question 33. The agent helped them _________ cheaper options.", options: ["look down on", "come up with", "cut down on", "go in for"], correct: 1 },
        { id: 34, q: "Question 34. The government had the historic building ______ rather than demolished.", options: ["restore", "to restore", "restored", "restoring"], correct: 2 },
        { id: 35, q: "Question 35. _________ we hurry, we'll miss the beginning of the movie.", options: ["If", "Unless", "As long as", "As soon as"], correct: 1 }
    ];

    let correctCountTotal = 0;
    let firstTimeCorrect = 0;
    let attemptedQuestions = new Set();

    // Render Quiz
    const container = document.getElementById('quiz-container');
    questions.forEach((item, index) => {
        const div = document.createElement('div');
        div.className = 'question-block';
        div.innerHTML = `
            <span class="question-text">${item.q}</span>
            <div class="options" id="grid-${index}">
                ${item.options.map((opt, i) => `
                    <div class="opt" onclick="checkAnswer(${index}, ${i}, this)">
                        ${String.fromCharCode(65 + i)}. ${opt}
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(div);
    });

    function checkAnswer(qIdx, oIdx, el) {
        const item = questions[qIdx];
        const grid = document.getElementById(`grid-${qIdx}`);

        // Ghi nhận lần click đầu tiên cho câu hỏi này
        if (!attemptedQuestions.has(qIdx)) {
            if (oIdx === item.correct) firstTimeCorrect++;
            attemptedQuestions.add(qIdx);
        }

        if (oIdx === item.correct) {
            // Đúng: Hiện xanh
            el.classList.add('correct');
            // Khóa các lựa chọn khác trong câu này
            Array.from(grid.children).forEach(child => {
                if (!child.classList.contains('correct')) child.classList.add('disabled');
                child.onclick = null;
            });

            correctCountTotal++;
            // Nếu đã hoàn thành tất cả 35 câu thì hiện nút nộp bài
            if (correctCountTotal === questions.length) {
                document.getElementById('submit-btn').style.display = 'block';
            }
        } else {
            // Sai: Hiện đỏ
            el.classList.add('wrong');
        }
    }

    // Timer logic
    let timeLeft = 45 * 60;
    const timerTick = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60);
        let s = timeLeft % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        if (timeLeft <= 0) showFinalResult();
    }, 1000);

    function showFinalResult() {
        clearInterval(timerTick);
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('timer').style.display = 'none';

        const score = (firstTimeCorrect / questions.length * 10).toFixed(2);
        document.getElementById('score-text').innerText = `Điểm thực tế: ${score}/10 (Số câu đúng lần đầu không sửa: ${firstTimeCorrect}/${questions.length})`;
        
        let history = JSON.parse(localStorage.getItem('lastQuizResult')) || { score: 0 };
        const diff = (score - history.score).toFixed(2);
        
        document.getElementById('comparison-text').innerText = `Bạn đã ${diff >= 0 ? 'vượt qua' : 'thấp hơn'} người làm gần nhất ${Math.abs(diff)} điểm!`;

        localStorage.setItem('lastQuizResult', JSON.stringify({ score: score }));
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
