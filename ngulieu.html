<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm Ngữ Liệu - NTT</title>
    <style>
        :root {
            --primary: #0b3d91;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #0b192e;
            --card: #ffffff;
            --accent: #fc3d21;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(white, rgba(255,255,255,0.1) 1px, transparent 20px);
            background-size: 40px 40px;
            color: #334155;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .exercise-container {
            margin-bottom: 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }

        .exercise-header {
            background: var(--primary);
            color: white;
            padding: 15px 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .passage-box {
            background: #f1f5f9;
            padding: 20px;
            border-bottom: 1px solid #e2e8f0;
            font-style: normal;
            line-height: 1.8;
            white-space: pre-line;
            font-size: 1.05rem;
        }

        .question-item {
            padding: 20px;
            border-bottom: 1px dashed #cbd5e1;
        }

        .question-text {
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            color: #1e293b;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 650px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: white;
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #f8fafc;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: var(--success) !important;
            color: var(--success);
            pointer-events: none;
        }

        .option-btn.wrong {
            background: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: var(--danger);
            animation: shake 0.4s;
        }

        .option-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .final-footer {
            text-align: center;
            margin-top: 40px;
            color: #f8fafc;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HỆ THỐNG LUYỆN TẬP ĐỌC HIỂU & ĐIỀN TỪ</h1>
    <div id="main-quiz"></div>
</div>

<div class="final-footer">Thiết kế bởi NTT@THPTLTV-2026</div>

<script>
const quizData = [
    {
        title: "Ex 1: JOB - MARKETING STAFF",
        passage: `REQUIREMENTS:\n* Experienced in marketing, communications or related fields.\n* Knowledge of current marketing trends, techniques and best practices.\n* Ability (1)_______ develop and (2)_______ marketing plans and strategies\nAPPLY NOW\n(3)_______ you be ready, please send us at email address: hello@reallygreatsite.com`,
        questions: [
            { q: "Question 1", opts: ["A. to", "B. from", "C. of", "D. at"], ans: 0 },
            { q: "Question 2", opts: ["A. implement", "B. impair", "C. import", "D. impoverish"], ans: 0 },
            { q: "Question 3", opts: ["A. Do", "B. Should", "C. If only", "D. Were"], ans: 1 }
        ]
    },
    {
        title: "Ex 2: ANNOUNCEMENT OF THE MID-TERM TESTS",
        passage: `The school administrators would like to announce\n➢ All students (1)______ present by 7:30, from Dec 26 upto Dec 29.\n➢ (2)______ cheating during your tests.\n➢ Bringing along mobile devices (3)_______ stopping your tests.`,
        questions: [
            { q: "Question 1", opts: ["A. must", "B. required", "C. have to be", "D. receive"], ans: 2 },
            { q: "Question 2", opts: ["A. Without", "B. Not", "C. No", "D. Hardly"], ans: 2 },
            { q: "Question 3", opts: ["A. means", "B. equal", "C. requires", "D. refers"], ans: 0 }
        ]
    },
    {
        title: "Ex 3: Cooking Vocational School",
        passage: `Interested in cooking? Join our vocational school's cooking courses!\n•No (1)_______ prior experience required; anyone should enroll.\n•Learn essential culinary skills (2)_______ experienced instructors.\n•For more information and registration, contact us via the provided contact information below.\nWhether you're a complete novice or looking to refine your cooking abilities, our courses cater to all skill levels. Explore (3)_______ cuisines, master cooking techniques, and unleash your creativity in the kitchen. Don't hesitate – sign up now and embark on your culinary journey with us!`,
        questions: [
            { q: "Question 1", opts: ["A. a", "B. an", "C. the", "D. Ø (no article)"], ans: 3 },
            { q: "Question 2", opts: ["A. from", "B. on", "C. at", "D. for"], ans: 0 },
            { q: "Question 3", opts: ["A. diversity", "B. diverse", "C. biodiversity", "D. diversify"], ans: 1 }
        ]
    },
    {
        title: "Ex 4: Water Conservation",
        passage: `Man and most animals need a constant supply of water to live. Farmers need water for their crops. Hydroelectric dams hold back needed water and provide power for homes and industries.\nTrees and grass, and other plant life play an important part in the natural circulation of water, thus help conserve it. Without plants, most water would run off as soon as it falls, taking away valuable soil. Rapid runoff would cause frequent floods, and leave little water during dry seasons.\nNature has many ways of conserving and controlling water. But man often upsets the water balance in his desire to grow more crops. He drains ponds, swamps and wet land. He ploughs under the natural soil, cuts timber, and dredges and straightens streams. These changes reduce natural storage of water and speed runoff.\nWater can be held on the land by planting vegetation. Forests and grass should be planted where there are no natural growths. Dams built across rivers help hold back the water. Reservoirs behind the dams store water during wet seasons for use in dry seasons. Dams help prevent floods by controlling the flow of water.\nNote: to dredge = to make a river deeper`,
        questions: [
            { q: "1. What is the topic of the passage?", opts: ["A. Water circulation", "B. Water conservation", "C. Controlling water", "D. Use of water"], ans: 1 },
            { q: "2. What is the consequence of having no plants on land?", opts: ["A. no water", "B. frequent floods", "C. dry crops", "D. valuable soil"], ans: 1 },
            { q: "3. Which is one of the ways that men do to affect the water balance?", opts: ["A. shortening streams", "B. cutting down trees", "C. preserving water", "D. protecting ponds and swamps"], ans: 1 },
            { q: "4. What is NOT a natural way of conserving and controlling water?", opts: ["A. ponds", "B. streams", "C. swamps", "D. reservoirs"], ans: 3 },
            { q: "5. What do people use reservoirs for?", opts: ["A. growing plants", "B. building dams", "C. storing water", "D. preventing floods"], ans: 2 }
        ]
    },
    {
        title: "Ex 5: The Nelson Family",
        passage: `Mr. and Mrs. Nelson have two children, Lara 10 and Peter is 16. Mrs. Nelson first discovered that Peter was getting into trouble when school rang her to say that he hadn’t turned up that day, or the day before. She realized right away that he had been truanting.\nPeter’s behaviour was causing conflict in the house and Mr. and Mrs. Nelson were both concerned. They had different views of how they should deal with Peter’s behaviour and this led to rows that upset the whole family. They decided to prevent Peter from going out with his friends, but this just made him more stubborn, and he would continue to miss school and stay outside his curfew.\nOver the coming weeks, family life became more and more difficult. Mr. and Mrs. Nelson felt that they could no longer do this on their own and asked the school to help. The school arranged for Peter to talk to someone he trusted, and they made an agreement for him to start gradually attending school again. He was also given some time to catch up with the work he had missed.\nAs he started to talk it through, Peter realized that he had been unhappy at school for a while. He admitted that he had felt lonely since his best friend moved away and another group of friends had persuaded him to skip school. As he missed more and more school, it became harder to go back.\nPeter was encouraged to tell his parents how much he missed his friend and that he wanted to spend time with his dad playing football or fishing. Mr. Nelson thought he had grown out of that a long time ago but was pleased to spend time with Peter again.\nMr. and Mrs. Nelson tried to notice every day when Peter achieved his goal of attending school, being on time and remembering to do his homework. It took a little longer for Peter’s friendships to return to normal and Peter has had to learn to prove himself trustworthy to his parents, but gradually Mr. and Mrs. Nelson are learning to trust Peter again.`,
        questions: [
            { q: "1. The conflict in the Nelsons was due to the fact that ______.", opts: ["A. Peter had been truanting at school", "B. Peter was getting into trouble at school", "C. they paid too much attention to Lara", "D. they didn’t agree on the solution to Peter’s problem"], ans: 3 },
            { q: "2. When Mr. and Mrs. Nelson applied severe punishment to Peter, ______.", opts: ["A. Peter stopped going out with his friends", "B. it had no effect and made the situation worse", "C. he missed his friends and stayed outside his curfew", "D. the family didn’t know how to deal with his behaviour"], ans: 1 },
            { q: "3. The school applied all the following things to help Peter EXCEPT that ______.", opts: ["A. they helped the Nelsons solve the problem on their own", "B. they agreed to allow him to come back to school", "C. they helped him to catch up with his study", "D. they tried to make his communication with his friends better"], ans: 3 },
            { q: "4. The reason why Peter got into trouble was that ______.", opts: ["A. it became harder for him to miss school", "B. he couldn’t talk about his problem at home and at school", "C. some of his friends had negative impact on him", "D. he wanted to move away with his best friend"], ans: 2 },
            { q: "5. The best solution to Peter’s problem was that ______.", opts: ["A. he went fishing with his dad again", "B. the school and family have helped and trusted him", "C. he could do his homework and go to school on time", "D. it took him a long time to have normal friendship again"], ans: 1 }
        ]
    }
];

const mainQuiz = document.getElementById('main-quiz');

quizData.forEach((ex, exIdx) => {
    const exDiv = document.createElement('div');
    exDiv.className = 'exercise-container';

    const header = document.createElement('div');
    header.className = 'exercise-header';
    header.innerText = ex.title;
    exDiv.appendChild(header);

    if(ex.passage) {
        const passage = document.createElement('div');
        passage.className = 'passage-box';
        passage.innerText = ex.passage;
        exDiv.appendChild(passage);
    }

    ex.questions.forEach((q, qIdx) => {
        const qItem = document.createElement('div');
        qItem.className = 'question-item';

        const qText = document.createElement('span');
        qText.className = 'question-text';
        qText.innerText = q.q;
        qItem.appendChild(qText);

        const optGrid = document.createElement('div');
        optGrid.className = 'options-grid';

        q.opts.forEach((optStr, oIdx) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = optStr;
            btn.onclick = () => {
                if(oIdx === q.ans) {
                    btn.classList.add('correct');
                    optGrid.querySelectorAll('.option-btn').forEach(b => {
                        if(!b.classList.contains('correct')) b.classList.add('disabled');
                    });
                } else {
                    btn.classList.add('wrong');
                    setTimeout(() => btn.classList.remove('wrong'), 400);
                }
            };
            optGrid.appendChild(btn);
        });

        qItem.appendChild(optGrid);
        exDiv.appendChild(qItem);
    });

    mainQuiz.appendChild(exDiv);
});
</script>

</body>
</html>
