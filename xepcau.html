<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sắp xếp câu</title>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; color: #1e293b; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        .question-block { margin-bottom: 30px; padding: 20px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; }
        .sentence-list { background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; border-left: 4px solid var(--primary); }
        .sentence-item { margin-bottom: 5px; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt { border: 2px solid #e2e8f0; padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; background: white; text-align: center; font-weight: bold; }
        
        .opt.wrong { background: #fee2e2; border-color: var(--danger); color: var(--danger); pointer-events: none; }
        .opt.correct { background: #dcfce7; border-color: var(--success); color: var(--success); pointer-events: none; }
        .opt.disabled { pointer-events: none; opacity: 0.5; }

        #result-area { display: none; text-align: center; margin-top: 30px; padding: 30px; background: #f0fdf4; border-radius: 15px; border: 2px solid var(--success); }
        .comparison-box { margin: 15px 0; padding: 10px; background: #fff; border-radius: 8px; border: 1px dashed var(--success); color: #166534; font-style: italic; }
        
        .btn { display: block; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-home { background: #64748b; color: white; padding: 12px 30px; text-decoration: none; display: inline-block; border-radius: 8px; margin-top: 20px; transition: 0.3s; }
        .btn-home:hover { background: #475569; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color: var(--primary)">SẮP XẾP CÂU THÀNH ĐOẠN VĂN HỢP LÝ</h1>
    <p style="text-align:center; color: #64748b;"><i>Chọn đáp án đúng (A, B, C, D) để vượt qua từng câu</i></p>

    <div id="quiz-container"></div>

    <button id="final-btn" class="btn" style="display:none;" onclick="showFinalResult()">NỘP BÀI & XEM KẾT QUẢ</button>

    <div id="result-area">
        <h2 id="score-text"></h2>
        <div id="comparison-text" class="comparison-box"></div>
        <a href="index.html" class="btn-home">Làm bài tập khác (Quay về trang chủ)</a>
    </div>
</div>

<script>
    const questions = [
        { 
            id: 1, 
            sentences: [
                "a. Nam: Hi, Jessica. I'm so excited as I've never met a talking robot before. Let's have a photo taken together!", 
                "b. Teacher: Hello, class. Please meet Jessica. She's a human-like robot and will be your guide today.", 
                "c. Jessica: Good morning, everybody. Welcome to the New Tech Centre."
            ], 
            opts: ["a – b – c", "b – a – c", "c – a – b", "b – c – a"], 
            ans: 3 
        },
        { 
            id: 2, 
            sentences: [
                "a. He can speak English fluently and has experience working with international clients.", 
                "b. Mr. John is applying for the position of project manager.", 
                "c. He graduated from London University in 2018 with a degree in Business Administration.", 
                "d. He is a hard-working person who always tries his best."
            ], 
            opts: ["c – a – b – d", "b – c – a – d", "b – a – c – d", "d – b – c – a"], 
            ans: 1 
        },
        { 
            id: 3, 
            sentences: [
                "a. I wanted to tell you that I’ve recently accepted a new job in New York, and I’ll be moving there next month. It’s a big change, but I’m really excited about this new chapter in my life.", 
                "b. Dear Emily,", 
                "c. I’m planning to visit my family before the big move, and I’d love to see you if you’re free during that time.", 
                "d. Hope this message finds you well! I wanted to catch you up on some recent news.", 
                "e. Take care, and I hope to see you soon!"
            ], 
            opts: ["b – d – a – c – e", "d – a – b – c – e", "b – a – d – c – e", "a – b – d – e – c"], 
            ans: 0 
        },
        { 
            id: 4, 
            sentences: [
                "a. First of all, lifelong learning can offer benefits for your professional development.", 
                "b. Another benefit is personal development, like taking a yoga class or learning how to cook a new dish you like.", 
                "c. Over all, lifelong learning is an important part of personal and professional development.", 
                "d. Lifelong learning also helps your social life.", 
                "e. Lifelong learning means continuing to acquire new knowledge and skills throughout your life.", 
                "f. It is an enjoyable process that can bring many opportunities to help you improve your work life, meet new friends, and achieve personal satisfaction."
            ], 
            opts: ["e – a – b – d – c – f", "d – f – e – b – c – a", "a – d – c – f – b – e", "f – c – b – e – d – a"], 
            ans: 0 
        },
        { 
            id: 5, 
            sentences: [
                "a. Thank you very much for your kind invitation.", 
                "b. Dear Mr. Brown,", 
                "c. I regret to inform you that I cannot attend the meeting due to a family emergency.", 
                "d. I hope we can meet another time."
            ], 
            opts: ["b – a – c – d", "a – b – c – d", "b – c – a – d", "c – b – d – a"], 
            ans: 0 
        },
        { 
            id: 6, 
            sentences: [
                "a. Alex: That makes sense, but I don't think AI is suitable for basic tasks.", 
                "b. Nick: Definitely. A doctor's job is such a tedious one that AI will likely take over.", 
                "c. Nick: You're right. Basic jobs may be perfect for AI, but humans may not want to relinquish control of more boring tasks.", 
                "d. Alex: Do you think AI will affect the role of doctors?"
            ], 
            opts: ["d – c – a – b", "d – b – a – c", "d – b – c – a", "a – d – c – b"], 
            ans: 1 
        },
        { 
            id: 7, 
            sentences: [
                "a. Then discover how AI can personalize learning experiences for every student.", 
                "b. First, explore innovative AI technologies reshaping classrooms worldwide.", 
                "c. Together with the use for your students, learn practical strategies for integrating AI tools into your teaching practices.", 
                "d. Here's what you'll learn in the workshop on AI.", 
                "e. Finally, engage in hands-on activities and interactive discussions led by AI experts."
            ], 
            opts: ["d – a – b – e – c", "d – b – a – c – e", "b – e – a – c – d", "b – c – a – e – d"], 
            ans: 1 
        },
        { 
            id: 8, 
            sentences: [
                "a. Furthermore, vocational training may not always provide opportunities for advancement or career growth beyond a certain point, especially in rapidly evolving industries where new skills are constantly in demand.", 
                "b. Firstly, it can sometimes be considered as limiting, as it focuses primarily on specific skill sets related to certain trades or professions, potentially narrowing future career options.", 
                "c. Secondly, vocational programs may not always offer the same level of theoretical knowledge as traditional higher education, which could be a disadvantage in certain industries that prioritize academic knowledge.", 
                "d. Vocational education, while valuable for many, also comes with its drawbacks.", 
                "e. Lastly, the practical nature of vocational education might not suit everyone’s learning style, as some individuals may thrive in more traditional classroom settings."
            ], 
            opts: ["d – c – e – a – b", "d – b – c – a – e", "c – d – a – e – b", "b – d – c – e – a"], 
            ans: 1 
        },
        { 
            id: 9, 
            sentences: [
                "a. Nam: Yes! I'm also trying to build a small AI Chabot for my work.", 
                "b. Mark: Hi Nam! Thanks. I've been learning about AI and how it's impacting industries. How about you, do you follow this field?", 
                "c. Nam: Hi, Mark! Long time no see. You seem to be more tech-savvy!"
            ], 
            opts: ["c-a-b", "b-c-a", "c-b-a", "a-c-b"], 
            ans: 2 
        },
        { 
            id: 10, 
            sentences: [
                "a. Jack: That sounds like a great idea. I hope it works out for you!", 
                "b. Emma: I'm going to apply for a management position in my company.", 
                "c. Jack: How do you plan to advance in your career?", 
                "d. Emma: I want to develop leadership skills and take on more responsibility.", 
                "e. Jack: Why a management position?"
            ], 
            opts: ["b-d-e-c-a", "c-b-e-d-a", "d-b-a-e-c", "d-a-c-b-e"], 
            ans: 1 
        },
        { 
            id: 11, 
            sentences: [
                "a. Please let me know if you can make it so I can prepare everything accordingly.", 
                "b. I’m going to have a birthday party at 6.30 p.m next Monday at my house. Are you free to come?", 
                "c. I’ve also invited some of our classmates, so it will be a great chance to catch up and have fun together.", 
                "d. There will be about 20 people at the party, most of them are my family and relatives.", 
                "e. There will be games, music, and plenty of food and drinks for everyone to enjoy then."
            ], 
            opts: ["b - e - c - d - a", "b - a - c - d – e", "b - d - c – e – a", "b - c - a - d - e"], 
            ans: 2 
        },
        { 
            id: 12, 
            sentences: [
                "a. It has transformed beliefs, art, and customs while encouraging cultural diversity.", 
                "b. Globalisation has made the world increasingly interconnected, bringing significant changes to people's lives and cultures.", 
                "c. Although lifestyles worldwide are becoming more similar, this connection has enriched societies with unique cultural exchanges.", 
                "d. As a result, globalisation has reshaped the way we live, fostering both unity and diversity.", 
                "e. Through globalisation, people can now experience food, fashion, and traditions from different parts of the world."
            ], 
            opts: ["b - d - a - e – c", "b - e - c- d - a", "b - c - a - d – e", "b - a - e - c - d"], 
            ans: 3 
        }
    ];

    let finishedCount = 0;
    let firstTimeCorrect = 0;
    let attempted = new Set();

    const container = document.getElementById('quiz-container');

    questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'question-block';
        div.innerHTML = `
            <div style="font-weight:bold; margin-bottom:10px;">Question ${idx+1}:</div>
            <div class="sentence-list">
                ${q.sentences.map(s => `<div class="sentence-item">${s}</div>`).join('')}
            </div>
            <div class="options-grid" id="grid-${idx}">
                ${q.opts.map((opt, i) => `
                    <div class="opt" onclick="checkAnswer(${idx}, ${i}, this)">
                        ${String.fromCharCode(65+i)}. ${opt}
                    </div>
                `).join('')}
            </div>
        `;
        container.appendChild(div);
    });

    function checkAnswer(qIdx, oIdx, el) {
        const correctIdx = questions[qIdx].ans;
        const grid = document.getElementById(`grid-${qIdx}`);

        if (!attempted.has(qIdx)) {
            if (oIdx === correctIdx) firstTimeCorrect++;
            attempted.add(qIdx);
        }

        if (oIdx === correctIdx) {
            el.classList.add('correct');
            Array.from(grid.children).forEach(child => {
                if (!child.classList.contains('correct')) child.classList.add('disabled');
                child.onclick = null;
            });
            finishedCount++;
            if (finishedCount === questions.length) {
                document.getElementById('final-btn').style.display = 'block';
            }
        } else {
            el.classList.add('wrong');
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('final-btn').style.display = 'none';
        
        const finalScore = (firstTimeCorrect / questions.length * 10).toFixed(2);
        document.getElementById('score-text').innerText = `Hoàn thành! Điểm thực tế: ${finalScore}/10`;
        
        let lastResult = JSON.parse(localStorage.getItem('npc_arrange_last_score')) || { score: 0, count: 0 };
        const diffCount = firstTimeCorrect - lastResult.count;

        let compMsg = (lastResult.count === 0) ? "Đây là lượt làm bài đầu tiên." : `So với lần trước: ${diffCount >= 0 ? 'Tăng' : 'Giảm'} ${Math.abs(diffCount)} câu đúng.`;
        document.getElementById('comparison-text').innerText = compMsg;

        localStorage.setItem('npc_arrange_last_score', JSON.stringify({ score: finalScore, count: firstTimeCorrect }));
        document.getElementById('result-area').style.display = 'block';
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
