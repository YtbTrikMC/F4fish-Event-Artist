<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Trắc Nghiệm Sắp Xếp Câu - NTT</title>
    <style>
        :root {
            --primary: #0b3d91;
            --success: #16a34a;
            --danger: #dc2626;
            --bg: #0b192e;
            --card: #ffffff;
            --accent: #00ffcc;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px);
            background-size: 50px 50px;
            color: #334155;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 4px solid var(--primary);
            padding-bottom: 10px;
            font-size: 1.5rem;
        }

        .exercise-title {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-block {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            background: #f8fafc;
        }

        .content-area {
            background: #fff;
            padding: 15px;
            border-left: 4px solid var(--accent);
            margin-bottom: 15px;
            font-size: 0.95rem;
            white-space: pre-line; /* Giữ nguyên xuống dòng của ngữ liệu */
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 600px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .opt {
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
            text-align: center;
            background: white;
        }

        .opt:hover { border-color: var(--primary); background: #f1f5f9; }

        .opt.correct {
            background: #dcfce7 !important;
            border-color: var(--success) !important;
            color: var(--success);
            pointer-events: none;
        }

        .opt.wrong {
            background: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: var(--danger);
            animation: shake 0.4s;
        }

        .opt.disabled { opacity: 0.5; pointer-events: none; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        #finish-msg {
            display: none;
            text-align: center;
            padding: 20px;
            background: var(--success);
            color: white;
            border-radius: 10px;
            margin-top: 30px;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HỆ THỐNG TRẮC NGHIỆM SẮP XẾP CÂU (REORDERING)</h1>
    <div id="quiz-container"></div>
    
    <div id="finish-msg">
        🎉 XUẤT SẮC! BẠN ĐÃ HOÀN THÀNH TẤT CẢ CÁC CÂU HỎI.
        <br><button onclick="location.reload()" style="margin-top:10px; cursor:pointer; padding:5px 15px;">Làm lại bài</button>
    </div>

    <div class="footer">Thiết kế bởi NTT@THPTLTV-2026</div>
</div>

<script>
const quizData = [
    {
        id: 1,
        text: `a. Nam: Hi, Mark! Long time no see. You look so good!\nb. Nam: Yes, I have. I exercise every morning and eat more healthy food.\nc. Mark: Hi, Nam! Thanks. You look so fit, too. Have you worked out a lot lately?`,
        opts: ["A. c – a – b", "B. b – c – a", "C. c – b – a", "D. a – c – b"],
        ans: 3 // D
    },
    {
        id: 2,
        text: `a. Alex: Why online classes ?\nb. Sue: I'm going to try online classes.\nc. Alex: How are you going to improve your English?\nd. Alex: I think online classes are too expensive. I don't think I'll try them.\ne. Sue: They improve our communication skills, and they have flexible schedules.`,
        opts: ["A. c – b – a – e – d", "B. c – e – d – b – a", "C. d – b – a – e – c", "D. d – e – a – b – c"],
        ans: 0 // A
    },
    {
        id: 3,
        text: `a. Jack: I think self-study is too difficult. I don’t have enough discipline.\nb. Linda: I’m going to try self-study courses.\nc. Jack: How are you planning to improve your skills?\nd. Jack: Why self-study courses?\ne. Linda: They help improve time management, and I can learn at my own pace.`,
        opts: ["A. d – b – a – e – c", "B. c – b – d – e – a", "C. c – e – d – b – a", "D. d – e – a – b – c"],
        ans: 1 // B
    },
    {
        id: 4,
        text: `a. Overall, a trip to Trang An offers a unique experience for nature lovers and history buffs alike.\nb. It is a scenic landscape complex that includes limestone karst mountains, caves, rivers, and rice paddies. The area is famous for its natural beauty and cultural significance, as it was once the capital of Vietnam during the Dinh and Le dynasties.\nc. Visitors can take a boat tour through the complex, which typically lasts around two to three hours. During the tour, you can see the breathtaking views of limestone cliffs, explore the caves, and visit the temples and pagodas located throughout the complex.\nd. Trang An is a UNESCO World Heritage Site located in Ninh Binh Province, Vietnam.\ne. Trang An is also home to several endangered species, including the Delacour's langur, a species of leaf monkey. The complex has been recognized as an important site for biodiversity conservation and ecotourism.`,
        opts: ["A. d – b – c – e – a", "B. c – d – a – e – b", "C. a – e – d – c – b", "D. d – a – b – e – c"],
        ans: 0 // A
    },
    {
        id: 5,
        text: `a. First, Bullying is when someone hurts another person on purpose. This can happen at school, online, or in the workplace. Bullying can cause serious problems for the person being bullied. They may feel sad and hopeless. Sometimes they don't want to go to school or work. In some cases, bullying can even lead to depression and suicide.\nb. These are just a few examples of the many social issues people face every day. It's important to talk about these problems and find solutions so that everyone can live a happy and healthy life.\nc. People today face many social issues. Some of these are overpopulation, poverty, and crime. In this article, I want to talk about three other important social issues: bullying, body shaming, and peer pressure.\nd. Peer pressure is when people try to get others to do something they don't want to do. This is often a problem for young people. For example, a teenager might feel pressure to smoke cigarettes or drink alcohol because their friends are doing it. Peer pressure can be very hard to resist. It can cause stress and anxiety.\ne. Body shaming is the second issues, it is when someone makes fun of another person's body. This can happen if a person person is too thin, too fat, or has some other physical difference. Body shaming can hurt people very much. It can make them feel bad about themselves. Sometimes it can even lead to eating disorders or other health problems.`,
        opts: ["A. c - a - e - b - d", "B. c - a - e - d – b", "C. c - a - d - e - b", "D. a - c - b - d – e"],
        ans: 1 // B
    },
    {
        id: 6,
        text: `a. Best wishes.\nb. First of all, self-study gives learners more freedom. They decide what they should study and how to learn depending on their abilities.\nc. Dear Lucy; I hope you are well. I am thinking about the advantages of self-study - learning at home without a teacher.\nd. Secondly, they can make learners responsible. They set their learning goals and make study plans to achieve them.\ne. Finally, it makes them more confident. Completing tasks and solving problems on their own boost learners' confidence.`,
        opts: ["A. a – b – d – e – c", "B. c – b – d – e – a", "C. a – b – e – c – d", "D. c – e – b – d – a"],
        ans: 1 // B
    },
    {
        id: 7,
        text: `a. I am writing to enquire about the tour guide training courses offered by SGV Vocational School. I am very interested in exploring different cultures and would like to know more about the courses.\nb. Dear Sir / Madam,\nc. Secondly, I would appreciate it if you could inform me if SGV Vocational School offers any discounts for students who are financially disadvantaged. This would greatly assist me in planning for the cost of the training.\nd. Lastly, I would like to enquire about the daily wage for the apprenticeships provided by SGV Vocational School. It would be great if you could provide me with more information about this opportunity.\ne. Thank you for considering my request. I look forward to hearing from you soon.\nYours faithfully,\nLan\nf. Firstly, I would like to ask if there is a test requirement to enroll in the tour guide training courses. As I do not have any previous qualifications in this field, I would like to know if there are any specific requirements for admission.`,
        opts: ["A. b – a – f – c – d - e", "B. b – a – c – f – d - e", "C. b – a – f – d – c - e", "D. b – a – f – e – c - d"],
        ans: 0 // A
    },
    {
        id: 8,
        text: `a. In addition, I think the time of training is quite short, and the cost is also affordable for me and my family.\nb. I like the fact that this course also provides apprenticeship opportunities.\nc. This will help me fіnd a suitable job immediately after I fіnish the course.\nd. Good morning, Ms Hoa.\ne. I’d be interested in a cooking course because cooking has always been my hobby.`,
        opts: ["A. e – d – b – a – c", "B. d – e – a– b – c", "C. b – a – c – d - e", "D. c – a – e – d – b"],
        ans: 1 // B
    },
    {
        id: 9,
        text: `a. Additionally, I am able to make friends with a lot of students coming from different universities in Hanoi.\nb. Firstly, this is certainly a chance for me to practise speaking English as much as possible.\nc. Also, a good thing about joining the club is that I must become more confident when I often present my ideas in front of the crowd.\nd. All the best.\ne. It’s a good way for me not only to improve my English but to practise my soft skills as well.\nf. Dear Jason, I hope you are doing well recently. I am writing this letter to let you know about why I have decided to participate in the English speaking club.`,
        opts: ["A. f- e – a - c – b - d", "B. f - c – a - b – e - d", "C. f- b - a - c – e - d", "D. f - a – b - c – e - d"],
        ans: 2 // C
    },
    {
        id: 10,
        text: `a. Teenagers may want to work part-time while still in school. Let's look at the pros and cons of teens having part- time jobs.\nb. So, if teenagers fail to balance work and study, they may not be able to get good grades or may even drop out of school.\nc. Secondly, they can learn to manage their time better.\nd. First, a part-time job provides extra pocket money.\ne. In conclusion, teenagers should be aware of both the pros and cons of working part-time.\nf. On the other hand, working teens may become tired and stressed as they will have less time to rest and study.`,
        opts: ["A. a – d– c – f – b – e", "B. a – d – f – c – b – e", "C. a – b – f – c – d – e", "D. a – b – d – c – f – e"],
        ans: 0 // A
    }
];

const container = document.getElementById('quiz-container');
let correctCount = 0;

quizData.forEach((q, idx) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = `block-${idx}`;

    const title = document.createElement('div');
    title.className = 'exercise-title';
    title.innerHTML = `<span>Question ${q.id}</span>`;
    
    const content = document.createElement('div');
    content.className = 'content-area';
    content.innerText = q.text;

    const grid = document.createElement('div');
    grid.className = 'options-grid';

    q.opts.forEach((text, optIdx) => {
        const btn = document.createElement('div');
        btn.className = 'opt';
        btn.innerText = text;
        btn.onclick = () => {
            if (optIdx === q.ans) {
                btn.classList.add('correct');
                grid.querySelectorAll('.opt').forEach(b => b.classList.add('disabled'));
                correctCount++;
                if (correctCount === quizData.length) {
                    document.getElementById('finish-msg').style.display = 'block';
                }
            } else {
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 400);
            }
        };
        grid.appendChild(btn);
    });

    block.appendChild(title);
    block.appendChild(content);
    block.appendChild(grid);
    container.appendChild(block);
});
</script>

</body>
</html>
