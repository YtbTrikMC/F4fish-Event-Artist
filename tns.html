    let correctCount = 0; 
    let hasFailedCurrent = false;

    function renderQuiz() {
        if (currentIdx >= quizData.length) {
            showFinalResult();
            return;
        }

        hasFailedCurrent = false;
        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = `Câu hỏi ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('message').innerText = "";
        
        const group = document.getElementById('optionsGroup');
        group.innerHTML = "";

        q.opts.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = text;
            btn.onclick = () => checkAnswer(i, btn);
            group.appendChild(btn);
        });
    }

    function checkAnswer(index, btn) {
        const correctIdx = quizData[currentIdx].correct;
        const msg = document.getElementById('message');

        if (index === correctIdx) {
            btn.classList.add('correct');
            if (!hasFailedCurrent) correctCount++;
            msg.innerText = "Chính xác!";
            msg.style.color = "#28a745";
            
            const buttons = document.querySelectorAll('.option');
            buttons.forEach(b => b.onclick = null);

            setTimeout(() => {
                currentIdx++;
                renderQuiz();
            }, 600);
        } else {
            btn.classList.add('wrong');
            btn.disabled = true;
            hasFailedCurrent = true;
            msg.innerText = "Sai rồi, chọn lại đi!";
            msg.style.color = "#dc3545";
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';

        const rawScore = (correctCount / quizData.length) * 10;
        document.getElementById('finalScore').innerText = rawScore.toFixed(2) + "đ";
        document.getElementById('correctCount').innerText = `Bạn đúng ngay lần đầu ${correctCount}/${quizData.length} câu.`;

        let comment = "Cần cố gắng nhiều hơn nè!";
        if (correctCount === quizData.length) comment = "vô thi đúng full trắc nghiệm haa";
        else if (correctCount >= 65) comment = "cũng chất đấy chứ";
        else if (correctCount >= 50) comment = "cũng ra gì phết";

        document.getElementById('commentText').innerText = comment;
    }

    window.onload = renderQuiz;
</script>

</body>
</html>
