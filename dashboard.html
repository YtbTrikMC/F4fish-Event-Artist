<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Npc Music Player</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a1a;
            color: white;
        }
        #player-container {
            margin-bottom: 20px;
        }
        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>Trình phát nhạc YouTube của Npc</h2>
    
    <div id="player-container">
        <div id="player"></div>
    </div>

    <input type="text" id="videoUrl" placeholder="Dán link YouTube vào đây...">
    <button onclick="loadVideo()">Phát nhạc</button>

    <script>
        // 1. Tải API của YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // Khởi tạo player nhưng để trống ban đầu
        }

        function loadVideo() {
            var url = document.getElementById('videoUrl').value;
            var videoId = extractVideoID(url);

            if (videoId) {
                if (player) {
                    player.loadVideoById(videoId);
                } else {
                    player = new YT.Player('player', {
                        height: '200',
                        width: '350',
                        videoId: videoId,
                        events: {
                            'onReady': onPlayerReady
                        }
                    });
                }
            } else {
                alert("Link không hợp lệ bạn ơi!");
            }
        }

        function onPlayerReady(event) {
            event.target.playVideo();
        }

        // Hàm lấy ID video từ link
        function extractVideoID(url) {
            var regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            var match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : false;
        }
    </script>
</body>
</html>
