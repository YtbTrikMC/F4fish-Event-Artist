<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Học Kỳ 2 - NTT</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --history-orange: #d35400; 
            --history-gold: #f1c40f;   
            --hover-blue: #154ba3;
            --bg-color: #0b192e; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 600px;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Phần hiển thị số lượt làm */
        .counter-box {
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: #00ffcc;
            font-weight: bold;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .nav-button {
            text-decoration: none;
            color: white;
            background-color: var(--nasa-blue);
            padding: 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            cursor: pointer;
        }

        .nav-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-bio-ds { background-color: var(--nasa-red); }
        .btn-hist { background-color: var(--history-orange); }
        .btn-hist-ds { background-color: var(--history-gold); color: #000; }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 500px) {
            .button-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hệ Thống Ôn Tập</h1>
        
        <div class="counter-box">
            Số lượt làm: <span id="viewCount">Đang tải...</span>
        </div>
        
        <div class="button-group">
            <a onclick="updateCounter('tn.html')" class="nav-button">Trắc Nghiệm Sinh</a>
            <a onclick="updateCounter('ds.html')" class="nav-button btn-bio-ds">Đúng Sai Sinh</a>
            <a onclick="updateCounter('tns.html')" class="nav-button btn-hist">Trắc Nghiệm Sử</a>
            <a onclick="updateCounter('dss.html')" class="nav-button btn-hist-ds">Đúng Sai Sử</a>
        </div>

        <div class="footer">
            Thiết kế bởi NTT@THPTLTV-2026
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwx-X-7G5qfngSfDyAuZwD_qdgHzUdEciqkKfS6OSOle7K5Y-TH_LifqkpVTlqrUdeghg/exec";

        // 1. Hàm lấy số lượt hiện tại từ Google Sheet khi vừa mở trang
        async function getCount() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                document.getElementById('viewCount').innerText = data.luot_dung_moi || data.new_value || "0";
            } catch (error) {
                console.error("Lỗi lấy dữ liệu:", error);
                document.getElementById('viewCount').innerText = "Chưa kết nối";
            }
        }

        // 2. Hàm cập nhật số lượt khi nhấn nút và chuyển trang
        function updateCounter(targetUrl) {
            // Hiển thị trạng thái đang xử lý (tùy chọn)
            document.getElementById('viewCount').innerText = "...";

            // Gửi lệnh POST để cộng số
            fetch(API_URL, {
                method: "POST",
                mode: "no-cors" // Để tránh lỗi bảo mật khi gọi chéo tên miền
            }).then(() => {
                // Sau khi gửi xong, đợi 0.5s rồi chuyển trang để đảm bảo lệnh đã đi
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500);
            }).catch(err => {
                window.location.href = targetUrl; // Lỗi thì vẫn chuyển trang
            });
        }

        // Gọi hàm lấy số lượt khi load trang
        window.onload = getCount;
    </script>

</body>
</html>
