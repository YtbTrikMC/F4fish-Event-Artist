<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Học Kỳ 2 - NTT</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --history-orange: #d35400; /* Màu cam cho Lịch sử */
            --history-gold: #f1c40f;   /* Màu vàng cho Lịch sử Đúng Sai */
            --hover-blue: #154ba3;
            --bg-color: #0b192e; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 600px;
        }

        h1 {
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .button-group {
            display: grid; /* Sử dụng grid để chia 2 cột cho đẹp */
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .nav-button {
            text-decoration: none;
            color: white;
            background-color: var(--nasa-blue);
            padding: 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
        }

        .nav-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Sinh học */
        .btn-bio-ds { background-color: var(--nasa-red); }
        .btn-bio-ds:hover { background-color: #ff523b; }

        /* Lịch sử */
        .btn-hist { background-color: var(--history-orange); }
        .btn-hist:hover { background-color: #e67e22; }

        .btn-hist-ds { background-color: var(--history-gold); color: #000; } /* Chữ đen cho dễ đọc trên nền vàng */
        .btn-hist-ds:hover { background-color: #f39c12; }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }

        @media (max-width: 500px) {
            .button-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hệ Thống Ôn Tập</h1>
        
        <div class="button-group">
            <a href="tn.html" class="nav-button">
                Trắc Nghiệm Sinh
            </a>
            
            <a href="ds.html" class="nav-button btn-bio-ds">
                Đúng Sai Sinh
            </a>

            <a href="tns.html" class="nav-button btn-hist">
                Trắc Nghiệm Sử
            </a>
            
            <a href="dss.html" class="nav-button btn-hist-ds">
                Đúng Sai Sử
            </a>
        </div>

        <div class="footer">
            Thiết kế bởi NTT@THPTLTV-2026
        </div>
    </div>

</body>
</html>
