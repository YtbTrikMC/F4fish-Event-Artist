<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Học Kỳ 2 - NTT</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --history-orange: #d35400; 
            --history-gold: #f1c40f;   
            --hover-blue: #154ba3;
            --bg-color: #0b192e; 
            --accent-green: #00ffcc;
            --chemistry-purple: #8e44ad;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }

        .announcement {
            background: rgba(252, 61, 33, 0.2);
            border: 1px dashed var(--nasa-red);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #ff9f91;
        }

        h1 {
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        .total-counter {
            color: var(--accent-green);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .user-id-info {
            font-size: 0.8rem;
            margin-bottom: 20px;
            opacity: 0.9;
            background: rgba(0, 255, 204, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .btn-rename {
            background: none;
            border: 1px solid var(--accent-green);
            color: var(--accent-green);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-rename:hover {
            background: var(--accent-green);
            color: var(--bg-color);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .full-width { grid-column: span 2; }

        .nav-button {
            text-decoration: none;
            color: white;
            background-color: var(--nasa-blue);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
        }

        .nav-button:hover:not(.disabled) { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        
        /* Trạng thái nút bị khóa */
        .nav-button.disabled {
            background-color: #444 !important;
            color: #888 !important;
            cursor: not-allowed;
            opacity: 0.6;
            position: relative;
        }
        .nav-button.disabled::after {
            content: " 🔒";
            font-size: 0.8rem;
        }

        .btn-bio-ds { background-color: var(--nasa-red); }
        .btn-hist { background-color: var(--history-orange); }
        .btn-hist-ds { background-color: var(--history-gold); color: #000; }
        .btn-chem { background-color: var(--chemistry-purple); }

        .leaderboard {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: left;
        }

        .leaderboard h3 {
            text-align: center;
            margin-top: 0;
            font-size: 1rem;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .lb-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .lb-rank { font-weight: bold; color: var(--history-gold); width: 30px; }
        .lb-name { flex-grow: 1; }
        .lb-score { color: var(--accent-green); }

        .footer { margin-top: 20px; font-size: 0.7rem; opacity: 0.6; }

        @media (max-width: 500px) { 
            .button-group { grid-template-columns: 1fr; } 
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="announcement">
            📢 <b>THÔNG BÁO:</b> 22/04/2026 sẽ cập nhật đề môn Tin học.
        </div>

        <h1>Hệ Thống Ôn Tập</h1>
        
        <div class="total-counter">
            Tổng số lượt làm: <span id="totalCount">...</span>
        </div>
        
        <div class="user-id-info">
            <span id="userDisplay">Đang xác định...</span>
            <button class="btn-rename" onclick="forceRename()">Đổi tên</button>
        </div>
        
        <div class="button-group">
            <a class="nav-button disabled">Trắc Nghiệm Sinh</a>
            <a class="nav-button btn-bio-ds disabled">Đúng Sai Sinh</a>
            <a class="nav-button btn-hist disabled">Trắc Nghiệm Sử</a>
            <a class="nav-button btn-hist-ds disabled">Đúng Sai Sử</a>
            <a onclick="updateCounter('tnh.html')" class="nav-button btn-chem full-width">🔥 HOT! Trắc Nghiệm Hóa</a>
            <a onclick="updateCounter('dsh.html')" class="nav-button btn-chem full-width" style="margin-top: 10px;">Đúng Sai Hóa</a>
        </div>

        <div class="leaderboard">
            <h3>🏆 TOP LÀM BÀI TRẮC NGHIỆM </h3>
            <div id="lb-content">Đang tải bảng xếp hạng...</div>
        </div>

        <div class="footer">Thiết kế bởi NTT@THPTLTV-2026</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQXOMeU4M9tt3xqaL2rBjsh426TFxy6BOj-KWJezZrF-oNlMIvnvRNiIjL0QsxpJrm/exec";

        function getUserId() {
            let id = localStorage.getItem('ntt_user_id');
            if (!id || id.startsWith("user#")) {
                let name = prompt("Chào mừng! Hãy nhập họ tên của bạn để lưu danh bảng vàng:", "");
                if (name && name.trim() !== "") {
                    id = name.trim();
                } else if (!id) {
                    id = "user#" + Math.floor(1000 + Math.random() * 9000);
                }
                localStorage.setItem('ntt_user_id', id);
            }
            return id;
        }

        function forceRename() {
            let currentId = localStorage.getItem('ntt_user_id');
            let name = prompt("Nhập tên mới để thay thế tên cũ (" + currentId + "):", "");
            if (name && name.trim() !== "") {
                localStorage.setItem('ntt_user_id', name.trim());
                location.reload();
            }
        }

        async function loadData() {
            const myId = getUserId();
            document.getElementById('userDisplay').innerText = "Thí sinh: " + myId;

            try {
                const response = await fetch(API_URL);
                const data = await response.json(); 
                
                let students = data.slice(1)
                    .map(item => ({ name: item[0], score: parseInt(item[1]) || 0 }))
                    .sort((a, b) => b.score - a.score);

                let total = students.reduce((sum, s) => sum + s.score, 0);
                document.getElementById('totalCount').innerText = total;

                let top10 = students.slice(0, 10);
                let lbHtml = "";
                top10.forEach((s, index) => {
                    lbHtml += `
                        <div class="lb-item">
                            <span class="lb-rank">#${index + 1}</span>
                            <span class="lb-name">${s.name} ${s.name === myId ? '(Bạn)' : ''}</span>
                            <span class="lb-score">${s.score}</span>
                        </div>`;
                });
                document.getElementById('lb-content').innerHTML = lbHtml || "Chưa có dữ liệu";
            } catch (e) {
                document.getElementById('totalCount').innerText = "Lỗi";
                document.getElementById('lb-content').innerText = "Lỗi kết nối";
            }
        }

        function updateCounter(targetUrl) {
            const myId = getUserId();
            const totalEl = document.getElementById('totalCount');
            totalEl.innerText = (parseInt(totalEl.innerText) || 0) + 1;

            fetch(API_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify({ userId: myId })
            });

            setTimeout(() => { window.location.href = targetUrl; }, 200);
        }

        window.onload = loadData;
    </script>
</body>
</html>
