<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Học Kỳ 2 - NTT</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --history-orange: #d35400; 
            --history-gold: #f1c40f;   
            --bg-color: #0b192e; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 600px;
        }

        h1 { margin-bottom: 20px; font-weight: 300; text-transform: uppercase; }

        .counter-box {
            margin-bottom: 30px;
            font-size: 1.1rem;
            color: #00ffcc;
            font-weight: bold;
            background: rgba(0, 255, 204, 0.1);
            padding: 8px 20px;
            border-radius: 50px;
            display: inline-block;
            min-width: 150px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .nav-button {
            text-decoration: none;
            color: white;
            background-color: var(--nasa-blue);
            padding: 20px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-button:hover { transform: translateY(-3px); border-color: white; }
        .btn-bio-ds { background-color: var(--nasa-red); }
        .btn-hist { background-color: var(--history-orange); }
        .btn-hist-ds { background-color: var(--history-gold); color: #000; }

        @media (max-width: 500px) { .button-group { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hệ Thống Ôn Tập</h1>
        
        <div class="counter-box">
            Số lượt làm: <span id="viewCount">0</span>
        </div>
        
        <div class="button-group">
            <a onclick="updateCounter('tn.html')" class="nav-button">Trắc Nghiệm Sinh</a>
            <a onclick="updateCounter('ds.html')" class="nav-button btn-bio-ds">Đúng Sai Sinh</a>
            <a onclick="updateCounter('tns.html')" class="nav-button btn-hist">Trắc Nghiệm Sử</a>
            <a onclick="updateCounter('dss.html')" class="nav-button btn-hist-ds">Đúng Sai Sử</a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwx-X-7G5qfngSfDyAuZwD_qdgHzUdEciqkKfS6OSOle7K5Y-TH_LifqkpVTlqrUdeghg/exec";

        // 1. HIỆN SỐ NGAY LẬP TỨC
        (function init() {
            const countEl = document.getElementById('viewCount');
            // Lấy số từ bộ nhớ máy hiện ra ngay (mất 0.001s)
            const cached = localStorage.getItem('ntt_count');
            if (cached) countEl.innerText = cached;

            // Chạy ngầm cập nhật số mới từ server
            fetch(API_URL).then(r => r.json()).then(d => {
                const num = d.luot_dung_moi || d.new_value || cached || "0";
                countEl.innerText = num;
                localStorage.setItem('ntt_count', num);
            }).catch(() => {});
        })();

        // 2. CẬP NHẬT KHI NHẤN (KHÔNG CHỜ ĐỢI)
        function updateCounter(url) {
            const countEl = document.getElementById('viewCount');
            let current = parseInt(countEl.innerText) || 0;
            
            // Tăng số trên màn hình ngay lập tức (đánh lừa thị giác)
            countEl.innerText = current + 1;
            localStorage.setItem('ntt_count', current + 1);

            // Gửi lệnh lên Google âm thầm
            fetch(API_URL, { method: "POST", mode: "no-cors" });

            // Chuyển trang luôn sau 100ms (cực nhanh)
            setTimeout(() => { window.location.href = url; }, 100);
        }
    </script>
</body>
</html>
