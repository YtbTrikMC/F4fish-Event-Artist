        {q: "Câu 6. Thả rong vào hồ cá cạnh tranh gay gắt nhằm:", opts: ["A. Giảm sự cạnh tranh giữa 2 loài.", "B. Tăng hàm lượng oxi.", "C. Làm nguồn thức ăn.", "D. Giữ pH ổn định."], correct: 0},
        {q: "Câu 7. Biến động số lượng cá thể KHÔNG theo chu kì?", opts: ["A. Ếch chết do mùa đông rét đột ngột.", "B. Chim cu gáy mùa lúa.", "C. Cáo tăng chu kì 3-4 năm.", "D. Sâu hại mùa xuân."], correct: 0},
        {q: "Câu 8. Tảo biển sinh sản tăng ban ngày, giảm ban đêm là:", opts: ["A. Nhịp chu kì ngày đêm.", "B. Biến động chu kì ngày đêm.", "C. Biến động không chu kì.", "D. Thường biến."], correct: 1},
        {q: "Câu 1: Quần xã là:", opts: ["A. Tập hợp cùng loài.", "B. Tập hợp khác loài cùng không gian xác định.", "C. Tập hợp khác loài cùng khu vực thời điểm nhất định.", "D. Tập hợp khác loài, cùng không gian xác định, vào thời điểm nhất định."], correct: 3},
        {q: "Câu 2: Các đặc trung cơ bản của quần xã là:", opts: ["A. Thành phần loài, mật độ.", "B. Độ phong phú, sự phân bố.", "C. Thành phần loài, sinh sản tử vong.", "D. Thành phần loài, sự phân bố, chức năng dinh dưỡng."], correct: 3},
        {q: "Câu 3: Mức độ phong phú về số loài trong quần xã là:", opts: ["A. độ nhiều.", "B. độ đa dạng.", "C. độ thường gặp.", "D. sự phổ biến."], correct: 1},
        {q: "Câu 4: Loài ưu thế có vai trò quan trọng do:", opts: ["A. số lượng cá thể nhiều.", "B. sức sống mạnh, sinh khối lớn.", "C. có khả năng tiêu diệt loài khác.", "D. số lượng nhiều, sinh khối lớn, hoạt động mạnh."], correct: 3},
        {q: "Câu 5: Quan hệ hỗ trợ trong quần xã bao gồm:", opts: ["A. cộng sinh, hợp tác, tương trợ.", "B. cộng gộp, hợp tác, hội sinh.", "C. cộng sinh, hợp tác, hội sinh.", "D. tương trợ, hợp tác, hội sinh."], correct: 2},
        {q: "Câu 6: Loài rận sống trên da chó hút máu là:", opts: ["A. hội sinh.", "B. cộng sinh.", "C. hợp tác.", "D. kí sinh - vật chủ."], correct: 3},
        {q: "Câu 7: Sư tử bắt linh dương ăn thịt thuộc quan hệ:", opts: ["A. hợp tác.", "B. hỗ trợ.", "C. cạnh tranh.", "D. động vật ăn thịt và con mồi."], correct: 3},
        {q: "Câu 8: Ví dụ về mối quan hệ cạnh tranh là:", opts: ["A. giun sán trong lợn.", "B. cỏ dại và lúa.", "C. khuẩn lam sống cùng động vật.", "D. thỏ và chó sói."], correct: 1},
        {q: "Câu 9: Một loài có lợi, một loài không lợi cũng không hại là:", opts: ["A. Cộng sinh.", "B. Hội sinh.", "C. Hợp tác.", "D. Ức chế."], correct: 1},
        {q: "Câu 10: Quan hệ hỗ trợ trong quần xã biểu hiện ở:", opts: ["A. cộng sinh, hội sinh, hợp tác.", "B. quần tụ bầy đàn.", "C. kí sinh, ăn thịt, ức chế.", "D. cộng sinh, hội sinh, kí sinh."], correct: 0},
        {q: "Câu 11: Ví dụ về cạnh tranh là:", opts: ["A. Giun sán trong lợn.", "B. Cỏ dại và lúa trên cánh đồng.", "C. Phong lan trên cây gỗ.", "D. Thỏ và chó sói."], correct: 1},
        {q: "Câu 12: Sơ đồ (+)/(-) biểu diễn mối quan hệ:", opts: ["A. Ức chế và kí sinh.", "B. Cạnh tranh và ăn thịt.", "C. Cộng sinh, ức chế.", "D. Kí sinh - vật chủ và động vật ăn thực vật."], correct: 3},
        {q: "Câu 13: Loài ngoại lai là loài sinh vật:", opts: ["A. Xuất hiện nơi không phải môi trường tự nhiên của nó.", "B. Sinh sống một khu vực địa lý nhất định.", "C. Di chuyển định kì.", "D. Có tính trạng chung hình thái."], correct: 0},
        {q: "Câu 14: Loài ngoại lai xâm hại là:", opts: ["A. lấn chiếm nơi sinh sống hoặc gây hại loài bản địa.", "B. có lợi loài bản địa.", "C. cung cấp dinh dưỡng.", "D. bảo vệ loài bản địa."], correct: 0}
    ];

    let currentIdx = 0;
    let scoreCount = 0; // Điểm tính theo câu đúng ngay lần đầu
    let hasFailedCurrent = false; // Đánh dấu xem câu hiện tại đã bấm sai chưa

    function renderQuiz() {
        if (currentIdx >= quizData.length) {
            showFinalResult();
            return;
        }

        hasFailedCurrent = false; // Reset trạng thái cho câu mới
        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = `Câu hỏi ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('message').innerText = "";
        
        const group = document.getElementById('optionsGroup');
        group.innerHTML = "";

        q.opts.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = text;
            btn.onclick = () => checkAnswer(i, btn);
            group.appendChild(btn);
        });
    }

    function checkAnswer(index, btn) {
        const correctIdx = quizData[currentIdx].correct;
        const msg = document.getElementById('message');

        if (index === correctIdx) {
            btn.classList.add('correct');
            
            // Nếu chưa từng bấm sai ở câu này, mới được cộng điểm
            if (!hasFailedCurrent) {
                scoreCount++;
            }

            msg.innerText = "Chính xác!";
            msg.style.color = "green";
            
            // Khóa các nút sau khi chọn đúng
            const buttons = document.querySelectorAll('.option');
            buttons.forEach(b => b.onclick = null);

            setTimeout(() => {
                currentIdx++;
                renderQuiz();
            }, 800);
        } else {
            btn.classList.add('wrong');
            hasFailedCurrent = true; // Đánh dấu là đã bấm sai câu này
            msg.innerText = "Chưa đúng, hãy chọn lại tới khi đúng!";
            msg.style.color = "red";
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';

        const rawScore = (scoreCount / quizData.length) * 10;
        const finalScore = rawScore.toFixed(2);
        
        document.getElementById('finalScore').innerText = finalScore + " điểm";
        document.getElementById('correctCount').innerText = `Đúng ngay lần đầu: ${scoreCount} / ${quizData.length} câu.`;

        let comment = "Cố gắng thêm chút nữa nhé!";
        if (scoreCount === 63) {
            comment = "vô thi đúng full trắc nghiệm haa";
        } else if (scoreCount >= 60) {
            comment = "cũng chất đấy chứ";
        } else if (scoreCount >= 50) {
            comment = "cũng ra gì phết";
        }

        document.getElementById('commentText').innerText = comment;
    }

    window.onload = renderQuiz;
</script>

</body>
</html>
