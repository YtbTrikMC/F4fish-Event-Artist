<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Sinh Học - 63 Câu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        .header { border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; color: #007bff; }
        .question { font-size: 1.15rem; line-height: 1.5; margin-bottom: 20px; color: #333; white-space: pre-line; }
        .option { display: block; width: 100%; margin: 10px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; text-align: left; background: #fff; font-size: 1rem; transition: 0.2s; }
        .option:hover { background: #f8f9fa; border-color: #007bff; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        #message { height: 30px; margin-top: 15px; font-weight: bold; text-align: center; }
        .result-box { text-align: center; padding: 20px; }
        .score { font-size: 3rem; color: #007bff; margin: 10px 0; }
        .comment { font-size: 1.5rem; color: #28a745; margin-bottom: 20px; font-style: italic; }
        button.retry-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <div class="header">
            <span>Hệ thống ôn tập Sinh học</span>
            <span id="progress">Đang tải...</span>
        </div>
        <div class="question" id="questionText"></div>
        <div id="optionsGroup"></div>
        <div id="message"></div>
    </div>

    <div id="result-ui" class="result-box" style="display: none;">
        <h2>KẾT QUẢ CỦA BẠN</h2>
        <div class="score" id="finalScore"></div>
        <div id="correctCount"></div>
        <div class="comment" id="commentText"></div>
        <button class="retry-btn" onclick="location.reload()">Làm lại từ đầu</button>
    </div>
</div>

        {q: "Câu 2. Đặc trưng cơ bản của quần xã là:", opts: ["A. Thành phần loài, lứa tuổi.", "B. Độ phong phú, phân bố.", "C. Thành phần loài, sinh sản tử vong.", "D. Thành phần loài, sự phân bố, chức năng dinh dưỡng."], correct: 3},
        {q: "Câu 3. Mức độ phong phú về số loài là:", opts: ["A. độ nhiều.", "B. độ đa dạng.", "C. độ thường gặp.", "D. sự phổ biến."], correct: 1},
        {q: "Câu 4. Loài ưu thế có vai trò quan trọng vì:", opts: ["A. số lượng nhiều.", "B. sức sống mạnh, sinh khối lớn.", "C. tiêu diệt loài khác.", "D. số lượng nhiều, sinh khối lớn, hoạt động mạnh."], correct: 3},
        {q: "Câu 5. Quan hệ hỗ trợ trong quần xã gồm:", opts: ["A. cộng sinh, hợp tác, tương trợ.", "B. cộng gộp, hợp tác, hội sinh.", "C. cộng sinh, hợp tác, hội sinh.", "D. tương trợ, hợp tác, hội sinh."], correct: 2},
        {q: "Câu 6. Rận hút máu chó là:", opts: ["A. hội sinh.", "B. cộng sinh.", "C. hợp tác.", "D. kí sinh - vật chủ."], correct: 3},
        {q: "Câu 7. Sư tử ăn linh dương là:", opts: ["A. hợp tác.", "B. hỗ trợ.", "C. cạnh tranh.", "D. động vật ăn thịt - con mồi."], correct: 3},
        {q: "Câu 8. Ví dụ về cạnh tranh:", opts: ["A. Giun sán trong lợn.", "B. Cỏ dại và lúa.", "C. Khuẩn lam và động vật xung quanh.", "D. Thỏ và sói."], correct: 1},
        {q: "Câu 9. Một loài có lợi, một loài không lợi cũng không hại là:", opts: ["A. Cộng sinh.", "B. Hội sinh.", "C. Hợp tác.", "D. Ức chế."], correct: 1},
        {q: "Câu 10. Quan hệ hỗ trợ biểu hiện ở:", opts: ["A. cộng sinh, hội sinh, hợp tác.", "B. quần tụ bầy đàn.", "C. kí sinh, ăn thịt, ức chế.", "D. cộng sinh, hội sinh, kí sinh."], correct: 0},
        {q: "Câu 11. Ví dụ về cạnh tranh:", opts: ["A. Giun sán trong lợn.", "B. Cỏ dại và lúa trên cánh đồng.", "C. Phong lan trên cây gỗ.", "D. Thỏ và sói."], correct: 1},
        {q: "Câu 12. Sơ đồ (+)/(-) là mối quan hệ:", opts: ["A. Ức chế và kí sinh.", "B. Cạnh tranh và ăn thịt.", "C. Cộng sinh, ức chế.", "D. Kí sinh - vật chủ và động vật ăn thực vật."], correct: 3},
        {q: "Câu 13. Loài ngoại lai là loài:", opts: ["A. Xuất hiện ở khu vực vốn không phải môi trường tự nhiên.", "B. Sinh sống một khu vực nhất định.", "C. Di chuyển định kì.", "D. Có tính trạng chung hình thái."], correct: 0},
        {q: "Câu 14. Loài ngoại lai xâm hại là:", opts: ["A. lấn chiếm nơi sinh sống hoặc gây hại loài bản địa.", "B. có lợi loài bản địa.", "C. cung cấp dinh dưỡng loài bản địa.", "D. bảo vệ loài bản địa."], correct: 0}
    ];

    let currentIdx = 0;
    let correctCount = 0;

    function renderQuiz() {
        if (currentIdx >= quizData.length) {
            showFinalResult();
            return;
        }

        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = `Câu hỏi ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('questionText').innerText = q.q;
        document.getElementById('message').innerText = "";
        
        const group = document.getElementById('optionsGroup');
        group.innerHTML = "";

        q.opts.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = text;
            btn.onclick = () => checkAnswer(i, btn);
            group.appendChild(btn);
        });
    }

    function checkAnswer(index, btn) {
        const correctIdx = quizData[currentIdx].correct;
        const msg = document.getElementById('message');

        if (index === correctIdx) {
            btn.classList.add('correct');
            correctCount++;
            msg.innerText = "Chính xác!";
            msg.style.color = "green";
            
            // Khóa các nút sau khi chọn đúng
            const buttons = document.querySelectorAll('.option');
            buttons.forEach(b => b.onclick = null);

            setTimeout(() => {
                currentIdx++;
                renderQuiz();
            }, 800);
        } else {
            btn.classList.add('wrong');
            msg.innerText = "Chưa đúng, thử lại nhé!";
            msg.style.color = "red";
        }
    }

    function showFinalResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';

        const rawScore = (correctCount / quizData.length) * 10;
        const finalScore = rawScore.toFixed(2);
        
        document.getElementById('finalScore').innerText = finalScore + " điểm";
        document.getElementById('correctCount').innerText = `Bạn đã làm đúng ${correctCount} / ${quizData.length} câu.`;

        let comment = "Cố gắng thêm chút nữa nhé!";
        if (correctCount === 63) {
            comment = "Vô thi đúng full trắc nghiệm haa";
        } else if (correctCount >= 60) {
            comment = "Cũng chất đấy chứ";
        } else if (correctCount >= 50) {
            comment = "Cũng ra gì phết";
        }

        document.getElementById('commentText').innerText = comment;
    }

    window.onload = renderQuiz;
</script>

</body>
</html>
