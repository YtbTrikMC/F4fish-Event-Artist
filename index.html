<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Ôn Tập Học Kỳ 2 - NTT</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --history-orange: #d35400; 
            --history-gold: #f1c40f;   
            --hover-blue: #154ba3;
            --bg-color: #0b192e; 
            --accent-green: #00ffcc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px 0;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
        }

        .announcement {
            background: rgba(252, 61, 33, 0.2);
            border: 1px dashed var(--nasa-red);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #ff9f91;
        }

        h1 {
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* Dòng tổng số lượt làm */
        .total-counter {
            color: var(--accent-green);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .user-id-info {
            font-size: 0.8rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-button {
            text-decoration: none;
            color: white;
            background-color: var(--nasa-blue);
            padding: 15px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .nav-button:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        .btn-bio-ds { background-color: var(--nasa-red); }
        .btn-hist { background-color: var(--history-orange); }
        .btn-hist-ds { background-color: var(--history-gold); color: #000; }

        .leaderboard {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: left;
        }

        .leaderboard h3 {
            text-align: center;
            margin-top: 0;
            font-size: 1rem;
            color: var(--accent-green);
            text-transform: uppercase;
        }

        .lb-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
        }

        .lb-rank { font-weight: bold; color: var(--history-gold); width: 30px; }
        .lb-name { flex-grow: 1; }
        .lb-score { color: var(--accent-green); }

        .footer { margin-top: 20px; font-size: 0.7rem; opacity: 0.6; }

        @media (max-width: 500px) { .button-group { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="announcement">
            📢 <b>THÔNG BÁO:</b> Update v1 - 21/4/2026 sẽ cập nhật Môn Hóa
        </div>

        <h1>Hệ Thống Ôn Tập</h1>
        
        <div class="total-counter">
            Tổng số lượt làm: <span id="totalCount">...</span>
        </div>
        <div id="userDisplay" class="user-id-info">Đang xác định...</div>
        
        <div class="button-group">
            <a onclick="updateCounter('tn.html')" class="nav-button">Trắc Nghiệm Sinh</a>
            <a onclick="updateCounter('ds.html')" class="nav-button btn-bio-ds">Đúng Sai Sinh</a>
            <a onclick="updateCounter('tns.html')" class="nav-button btn-hist">Trắc Nghiệm Sử</a>
            <a onclick="updateCounter('dss.html')" class="nav-button btn-hist-ds">Đúng Sai Sử</a>
        </div>

        <div class="leaderboard">
            <h3>🏆 TOP 10 CHĂM CHỈ</h3>
            <div id="lb-content">Đang tải bảng xếp hạng...</div>
        </div>

        <div class="footer">Thiết kế bởi NTT@THPTLTV-2026</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQXOMeU4M9tt3xqaL2rBjsh426TFxy6BOj-KWJezZrF-oNlMIvnvRNiIjL0QsxpJrm/exec";

        function getUserId() {
            let id = localStorage.getItem('ntt_user_id');
            if (!id) {
                id = "user#" + Math.floor(1000 + Math.random() * 9000);
                localStorage.setItem('ntt_user_id', id);
            }
            return id;
        }

        async function loadData() {
            const myId = getUserId();
            document.getElementById('userDisplay').innerText = "Mã của bạn: " + myId;

            try {
                const response = await fetch(API_URL);
                const data = await response.json(); 
                
                let students = data.slice(1)
                    .map(item => ({ name: item[0], score: parseInt(item[1]) || 0 }))
                    .sort((a, b) => b.score - a.score);

                // TÍNH TỔNG SỐ LƯỢT: Cộng dồn tất cả score của mọi người
                let total = students.reduce((sum, s) => sum + s.score, 0);
                document.getElementById('totalCount').innerText = total;

                // Hiển thị Top 10
                let top10 = students.slice(0, 10);
                let lbHtml = "";
                top10.forEach((s, index) => {
                    lbHtml += `
                        <div class="lb-item">
                            <span class="lb-rank">#${index + 1}</span>
                            <span class="lb-name">${s.name} ${s.name === myId ? '(Bạn)' : ''}</span>
                            <span class="lb-score">${s.score}</span>
                        </div>`;
                });
                document.getElementById('lb-content').innerHTML = lbHtml || "Chưa có dữ liệu";
            } catch (e) {
                document.getElementById('totalCount').innerText = "Lỗi";
                document.getElementById('lb-content').innerText = "Lỗi kết nối";
            }
        }

        function updateCounter(targetUrl) {
            const myId = getUserId();
            
            // Tăng số lượt tổng và số cá nhân trên màn hình ngay để nhìn cho "đã"
            const totalEl = document.getElementById('totalCount');
            totalEl.innerText = (parseInt(totalEl.innerText) || 0) + 1;

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ userId: myId })
            });

            setTimeout(() => { window.location.href = targetUrl; }, 200);
        }

        window.onload = loadData;
    </script>
</body>
</html>
