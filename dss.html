<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Đúng Sai</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .doc-box { background: #f8f9fa; border-left: 5px solid var(--primary); padding: 20px; margin-bottom: 25px; font-style: italic; line-height: 1.7; font-size: 1rem; color: #333; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .statement-row { display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center; padding: 15px; border-bottom: 1px solid #eee; transition: 0.3s; }
        .statement-text { font-size: 1rem; color: #333; line-height: 1.4; }
        .btn-group { display: flex; gap: 10px; min-width: 160px; }
        .btn-check { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; background: white; transition: 0.2s; }
        .btn-true:hover:not(:disabled) { border-color: var(--success); color: var(--success); }
        .btn-false:hover:not(:disabled) { border-color: var(--danger); color: var(--danger); }
        .active-true { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .active-false { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .nav-box { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; min-height: 50px; }
        #feedback { font-weight: bold; font-size: 1.1rem; color: var(--secondary); }
        button.main-btn { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; transition: 0.3s; }
        button.main-btn:hover { background: #1a252f; transform: translateY(-2px); }
        .result-screen { text-align: center; padding: 50px 0; display: none; }
        .score-big { font-size: 5rem; color: var(--primary); font-weight: 800; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <div class="header">
            <h2 style="margin:0; color: var(--primary);">LUYỆN TẬP LỊCH SỬ</h2>
            <p id="progress" style="color: #666; font-weight: bold; margin-top: 10px;">Đang tải...</p>
        </div>

        <div id="content-area">
            <div id="docContent" class="doc-box"></div>
            <div id="statementArea"></div>
        </div>

        <div class="nav-box">
            <div id="feedback"></div>
            <button class="main-btn" id="nextBtn" style="display: none;" onclick="processNext()">Tiếp tục</button>
        </div>
    </div>

    <div id="result-ui" class="result-screen">
        <h2>KẾT QUẢ HOÀN THÀNH</h2>
        <div class="score-big" id="finalScore">0</div>
        <p id="detailCount" style="font-size: 1.2rem; color: #555;"></p>
        <button class="main-btn" onclick="location.reload()">LÀM LẠI BÀI TẬP</button>
    </div>
</div>

<script>
    const quizData = [
        {
            doc: `“Trước hết phải có đảng cách mệnh, để trong thì vận động và tổ chức dân chúng, ngoài thì liên lạc với dân tộc bị áp bức và vô sản giai cấp mọi nơi. Đảng có vững cách mệnh mới thành công, cũng như người cầm lái có vững thuyền mới chạy”.<br>(Hồ Chí Minh: Toàn tập, Nxb. Chính trị quốc gia Sự thật, Hà Nội, 2006, t. 2, tr. 289)`,
            statements: [
                { text: "a) Muốn có Đảng vững mạnh, cần xây dựng sự đa dạng về tư tưởng và có tổ chức thống nhất.", ans: false },
                { text: "b) Đảng làm nhiệm vụ vận động nhân dân Việt Nam và thế giới cùng chống ngoại xâm.", ans: false },
                { text: "c) Đóng góp lớn đầu tiên của Hồ Chí Minh với cách mạng là tìm đường cứu nước và sáng lập Đảng Cộng sản Việt Nam.", ans: false },
                { text: "d) Theo Hồ Chí Minh, Đảng cách mạng là lực lượng lãnh đạo dân tộc.", ans: true }
            ]
        },
        {
            doc: `“Theo Người, bất cứ lịch sử xâm chiếm thực dân nào thì từ đầu đến cuối đều được viết bằng máu của những người bản xứ. Vì thế, để giải phóng mình, các dân tộc bị áp bức không có con đường nào khác là con đường cách mạng bạo lực. Hồ Chí Minh cho rằng, bạo lực cách mạng để đập tan bạo lực phản cách mạng của thực dân Pháp, giành chính quyền về tay nhân dân...”`,
            statements: [
                { text: "a) Vì cách mạng là sự nghiệp của quần chúng, nên Hồ Chí Minh đã xác định bạo lực cách mạng chỉ là bạo lực của Đảng Cộng sản, Nhà nước nhằm thực hiện mục tiêu giành và giữ chính quyền.", ans: false },
                { text: "b) Thực tiễn kháng chiến chống Mĩ (1954 – 1975) cho thấy tư tưởng Hồ Chí Minh thể hiện chủ nghĩa nhân văn, nhân đạo cao cả trong sử dụng bạo lực cách mạng chống lại bạo lực phản cách mạng.", ans: true },
                { text: "c) Đoạn tư liệu đề cập đến quan điểm của Hồ Chí Minh về bạo lực các mạng để đập tan lực lượng kẻ thù, giành chính quyền về tay nhân dân.", ans: true },
                { text: "d) Tư tưởng cách mạng và tư tưởng quân sự của Chủ tịch Hồ Chí Minh đã góp phần làm nên thắng lợi trọn vẹn cho sự nghiệp giải phóng dân tộc.", ans: true }
            ]
        },
        {
            doc: `“Chủ động hội nhập kinh tế quốc tế và khu vực theo tinh thần phát huy tối đa nội lực, nâng cao hiệu quả hợp tác quốc tế, bảo đảm độc lập tự chủ và định hướng xã hội chủ nghĩa, bảo vệ lợi ích dân tộc, an ninh quốc gia, giữ gìn bản sắc văn hóa dân tộc, bảo vệ môi trường”.`,
            statements: [
                { text: "a) Để phát triển bền vững, Việt Nam cần kết hợp hài hòa các yếu tố truyền thống và hiện đại.", ans: true },
                { text: "b) Việt Nam thực hiện hội nhập để xây dựng, phát triển đất nước.", ans: true },
                { text: "c) Độc lập dân tộc và chủ nghĩa xã hội là điều kiện tiên quyết để các nước hội nhập với Việt Nam.", ans: false },
                { text: "d) Việt Nam thực hiện hội nhập tuần tự từ khu vực đến quốc tế.", ans: false }
            ]
        },
        {
            doc: `“Việt Nam là thành viên tích cực, có trách nhiệm của hơn 70 tổ chức, diễn đàn quốc tế quan trọng của khu vực và thế giới, như: Liên hợp quốc (UN), ASEAN, AIPA, IPU, ASEM, APEC, WTO...”.`,
            statements: [
                { text: "a) Hoạt động đối ngoại và quá trình hội nhập kinh tế quốc tế của Việt Nam là nhân tố quyết định đưa đến thắng lợi của công cuộc Đổi mới đất nước.", ans: false },
                { text: "b) Với việc Việt Nam là thành viên của hơn 70 tổ chức quốc tế góp phần huy động các nguồn lực bên ngoài đẩy mạnh công nghiệp hoá, hiện đại hoá.", ans: true },
                { text: "c) Việt Nam gia nhập Liên hợp quốc là bước đầu của quá trình hội nhập khu vực và quốc tế.", ans: false },
                { text: "d) Đoạn tư liệu trên đề cập đến những thành tựu Việt Nam đạt được trong lĩnh vực đối ngoại.", ans: true }
            ]
        },
        {
            doc: `“Nhân dân Việt Nam chúng tôi yêu chuộng hòa bình, một nền hòa bình chân chính trọng độc lập và tự do thật sự... Mỹ phải chấm dứt chiến tranh xâm lược và rút quân ra khỏi miền Nam Việt Nam... Đó là cách đứng đắn để giải quyết vấn đề Việt Nam”.`,
            statements: [
                { text: "a) Trong đấu tranh ngoại giao với Mỹ, Việt Nam luôn kết hợp giương cao ngọn cờ độc lập tự chủ và ngọn cờ dân tộc chính nghĩa.", ans: true },
                { text: "b) Một trong những mục tiêu của đối ngoại Việt Nam thời kì chống Mỹ, cứu nước là buộc các nước tôn trọng các quyền dân tộc cơ bản của Việt Nam.", ans: true },
                { text: "c) Việt Nam là dân tộc yêu chuộng hòa bình, dân chủ nhưng không bao giờ nhân nhượng đối phương trong quá trình đàm phán.", ans: false },
                { text: "d) Theo Chủ tịch Hồ Chí Minh, cách đúng đắn nhất để giải quyết vấn đề Việt Nam là Mỹ phải chấm dứt chiến tranh xâm lược và rút quân ra khỏi miền Nam Việt Nam.", ans: true }
            ]
        },
        {
            doc: `“Hiệp định về chấm dứt chiến tranh, lập lại hòa bình ở Việt Nam chính thức được ký kết ngày 27-1-1973 tại Paris (Pháp) mở ra bước ngoặt mới trong lịch sử cuộc kháng chiến chống Mỹ... tạo thời cơ mới cho cách mạng Việt Nam tiếp tục tiến lên giành những thắng lợi mới...”`,
            statements: [
                { text: "a) Đoạn tư liệu đề cập đến hoạt động đối ngoại của Việt Nam trong thời kì kháng chiến chống Mỹ, cứu nước (1954 – 1975).", ans: true },
                { text: "b) Hiệp định Pari là thành tựu tiêu biểu trong hoạt động đối ngoại của Việt Nam, đánh bại âm mưu “phân tuyến” của đối phương.", ans: false },
                { text: "c) Thắng lợi của Hiệp định Pari cho thấy Việt Nam hoàn thành nhiệm vụ “đánh cho Mỹ cút, đánh cho Nguỵ nhào”, tạo thời cơ mới cho cách mạng Việt Nam.", ans: false },
                { text: "d) Hiệp định Pari là biểu hiện của việc giải quyết các xung đột quốc tế bằng con đường hòa bình, tác động sâu sắc đến bước đường tiến lên của nhiều dân tộc.", ans: true }
            ]
        },
        {
            doc: `“Sức mạnh ngoại giao là một dạng “sức mạnh mềm” và ngoại giao đóng vai trò quan trọng tạo dựng thêm thế và lực của đất nước... các nước vừa và nhỏ vẫn có thể tham gia hiệu quả và có vai trò quan trọng trong các tổ chức quốc tế như Liên hợp quốc, WTO.”`,
            statements: [
                { text: "a) Hiện nay, ngoại giao của các quốc gia chỉ tập trung vào lĩnh vực chính trị, quốc phòng - an ninh. Ngoại giao thậm chí có thể đi trước mở đường cho đấu tranh chính trị và quân sự.", ans: false },
                { text: "b) Nội dung đoạn tư liệu trên phản ánh tầm quan trọng của ngoại giao trong gia tăng thế và lực của đất nước.", ans: true },
                { text: "c) Trong thời đại ngày nay, các quốc gia vừa và nhỏ luôn gặp những khó khăn khi tham gia các tổ chức quốc tế.", ans: false },
                { text: "d) Bài học kinh nghiệm cho Việt Nam trong hoạt động đối ngoại là phải tích cực, chủ động, theo sát tình hình, tận dụng thời cơ để nâng cao vị thế.", ans: true }
            ]
        },
        {
            doc: `<b>BẢNG THÔNG TIN HOẠT ĐỘNG NGUYỄN ÁI QUỐC:</b><br>- 1917-1920: Đảng Xã hội Pháp.<br>- 1920: Sáng lập Đảng Cộng sản Pháp.<br>- 1921: Hội Liên hiệp thuộc địa.<br>- 1923: Sang Liên Xô.<br>- 1925: Hội Liên hiệp các dân tộc bị áp bức ở Á Đông.`,
            statements: [
                { text: "a) Bảng thông tin trên đề cập đến hoạt động đối ngoại của Nguyễn Ái Quốc trong những năm 20 của thế kỉ XX.", ans: true },
                { text: "b) Hoạt động đối ngoại của Nguyễn Ái Quốc 20 năm đầu thế kỉ XX thể hiện tinh thần yêu nước, góp phần xác lập khuynh hướng cách mạng mới ở Việt Nam.", ans: true },
                { text: "c) Nguyễn Ái Quốc đã đứng trên lập trường của chiến sĩ cộng sản khi tham gia hoạt động trong Đảng Xã hội Pháp.", ans: false },
                { text: "d) Những hoạt động đối ngoại Phan Bội Châu, Phan Châu Trinh và Nguyễn Ái Quốc đều hướng đến mục tiêu cuối cùng là giành độc lập cho dân tộc Việt Nam.", ans: true }
            ]
        },
        {
            doc: `“Hỡi đồng bào yêu quý! Giờ quyết định cho vận mệnh dân tộc ta đã đến. Toàn quốc đồng bào hãy đứng dậy đem sức ta mà tự giải phóng cho ta. Nhiều dân tộc bị áp bức trên thế giới đang ganh nhau tiến bước giành quyền độc lập...”`,
            statements: [
                { text: "a) Sự chỉ đạo và hiệu triệu của Nguyễn Ái Quốc trong tháng Tám năm 1945 góp phần giúp nhân dân các nước Đông Dương giành độc lập.", ans: false },
                { text: "b) Đoạn tư liệu cho thấy vai trò của Nguyễn Ái Quốc trong lãnh đạo hai cuộc kháng chiến chống ngoại xâm thế kỉ XX ở Việt Nam.", ans: false },
                { text: "c) Nguyễn Ái Quốc cùng Trung ương Đảng Cộng sản Đông Dương đã biến thời cơ thành hành động cách mạng khi điều kiện thuận lợi ảnh hưởng tới vận mệnh dân tộc đến.", ans: true },
                { text: "d) Sự đúng đắn, sáng tạo của Nguyễn Ái Quốc là giải quyết linh hoạt mối quan hệ giữa dân tộc và giai cấp trong điều kiện cụ thể của Việt Nam vào tháng Tám năm 1945.", ans: true }
            ]
        }
    ];

    let currentQ = 0;
    let totalScore = 0;
    let correctInCurrentStep = 0;

    function loadQuestion() {
        if (currentQ >= quizData.length) {
            showResult();
            return;
        }
        
        correctInCurrentStep = 0;
        document.getElementById('progress').innerText = `Câu hỏi tư liệu ${currentQ + 1} / ${quizData.length}`;
        document.getElementById('docContent').innerHTML = quizData[currentQ].doc;
        document.getElementById('feedback').innerText = "Chọn đúng để hoàn thành câu.";
        document.getElementById('feedback').style.color = "var(--secondary)";
        document.getElementById('nextBtn').style.display = "none";
        
        const area = document.getElementById('statementArea');
        area.innerHTML = "";
        
        quizData[currentQ].statements.forEach((s, i) => {
            const row = document.createElement('div');
            row.className = 'statement-row';
            row.innerHTML = `
                <div class="statement-text">${s.text}</div>
                <div class="btn-group">
                    <button class="btn-check btn-true" id="t-${i}" onclick="checkStep(${i}, true, this)">Đúng</button>
                    <button class="btn-check btn-false" id="f-${i}" onclick="checkStep(${i}, false, this)">Sai</button>
                </div>
            `;
            area.appendChild(row);
        });
    }

    function checkStep(idx, val, btn) {
        const correctVal = quizData[currentQ].statements[idx].ans;
        const trueBtn = document.getElementById(`t-${idx}`);
        const falseBtn = document.getElementById(`f-${idx}`);

        if (val === correctVal) {
            // ĐÚNG: Xanh và khóa dòng
            btn.classList.add(val ? 'active-true' : 'active-false');
            trueBtn.disabled = true;
            falseBtn.disabled = true;
            correctInCurrentStep++;

            if (correctInCurrentStep === 4) {
                totalScore += 1;
                document.getElementById('feedback').innerText = "Tuyệt vời! Hãy tiếp tục.";
                document.getElementById('feedback').style.color = "var(--success)";
                document.getElementById('nextBtn').style.display = "block";
                document.getElementById('nextBtn').innerText = (currentQ === quizData.length -1) ? "Xem tổng điểm" : "Tiếp tục";
            }
        } else {
            // SAI: Đỏ rồi tắt để chọn lại
            btn.classList.add(val ? 'active-false' : 'active-true');
            document.getElementById('feedback').innerText = "Chưa chính xác!";
            document.getElementById('feedback').style.color = "var(--danger)";
            
            trueBtn.disabled = true;
            falseBtn.disabled = true;

            setTimeout(() => {
                btn.classList.remove('active-false', 'active-true');
                trueBtn.disabled = false;
                falseBtn.disabled = false;
                document.getElementById('feedback').innerText = "Chọn lại nào.";
                document.getElementById('feedback').style.color = "var(--secondary)";
            }, 600);
        }
    }

    function processNext() {
        currentQ++;
        loadQuestion();
    }

    function showResult() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('finalScore').innerText = totalScore;
        document.getElementById('detailCount').innerText = `Bạn đã vượt qua ${quizData.length} câu hỏi tư liệu.`;
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
