<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đúng Sai Sinh Học Ôn Tập Cuối Kì</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --bg-color: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #quiz-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            max-width: 950px;
            width: 100%;
        }

        h1 { color: var(--nasa-blue); text-align: center; border-bottom: 4px solid var(--nasa-blue); padding-bottom: 15px; }

        .progress-info { color: #888; text-align: right; font-weight: bold; margin-bottom: 10px; }

        .question-box { display: none; line-height: 1.6; }
        .active { display: block; animation: fadeIn 0.4s; }

        .full-question-text { 
            background: #fff; 
            border: 1px solid #eee; 
            padding: 20px; 
            margin-bottom: 20px; 
            border-left: 6px solid var(--nasa-blue);
            font-size: 1.05rem;
            color: #333;
        }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        th { background: #f8f9fa; color: var(--nasa-blue); }

        .options-container { display: grid; gap: 15px; }
        .option-card { background: #fdfdfd; border: 1px solid #ddd; padding: 15px; border-radius: 12px; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-true { background: #2ecc71; color: white; }
        .btn-false { background: #e74c3c; color: white; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        #msg { text-align: center; font-weight: bold; margin-top: 25px; min-height: 30px; color: var(--nasa-red); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>SINH HỌC ĐÚNG SAI</h1>
    <div id="progress" class="progress-info"></div>
    <div id="quiz-area"></div>
    <div id="msg"></div>
</div>

<script>
const data = [
    {
        fullText: "Câu 1. Tỷ lệ % các amino acid sai khác nhau ở chuỗi polypeptide anpha trong phân tử Hemoglobin thể hiện ở bảng sau: Dựa vào thông tin trên hãy xác định các nội dung sau là đúng hay sai?",
        table: `<table><tr><th>Loài</th><th>Cá mập</th><th>Cá chép</th><th>Kỳ nhông</th><th>Chó</th><th>Người</th></tr><tr><td>Cá mập</td><td>0%</td><td>59,4%</td><td>61,4%</td><td>56,8%</td><td>53,2%</td></tr><tr><td>Cá chép</td><td>0%</td><td>53,2%</td><td>47,9%</td><td>48,6%</td></tr><tr><td>Kỳ nhông</td><td>0%</td><td>46,1%</td><td>44,0%</td></tr><tr><td>Chó</td><td>0%</td><td>16,3%</td></tr><tr><td>Người</td><td>0%</td></tr></table>`,
        sub: ["a) Đây là bằng chứng sinh học phân tử", "b) Cá chép có quan hệ họ hàng xa nhất với người", "c) Dựa trên bằng chứng này ta có thể xác định được mối quan hệ họ hàng gần xa giữa các loài", "d) Trật tự đúng về mối quan hệ họ hàng giữa các loài là :người -> Chó -> Kì Giông -> Cá chép -> Cá mập."],
        ans: [true, false, true, true]
    },
    {
        fullText: "Câu 2. Bảng bên dưới thể hiện sự khác biệt về số lượng amino acid trong cytochrome C ở một số loài sinh vật so với người: Dựa vào bảng trên, mỗi nhận định sau đây là Đúng hay Sai?",
        table: `<table><tr><th>Loài sinh vật</th><th>Số lượng amino acid khác so với người</th></tr><tr><td>Tinh tinh</td><td>0</td></tr><tr><td>Khỉ Rhessus</td><td>1</td></tr><tr><td>Ruồi giấm</td><td>25</td></tr><tr><td>Nấm men</td><td>40</td></tr></table>`,
        sub: ["a) Bằng chứng dùng làm căn cứ để xác định mối quan hệ họ hàng trong thông tin trên là bằng chứng sinh học tế bào.", "b) Có 2 loài sinh vật được so sánh về sự khác biệt số lượng amino acid trong cytochrome C là thuộc nhóm linh trưởng.", "c) Ở nấm men, tất cả các phân tử sinh học đều có số lượng amino acid khác so với ở người là 40.", "d) Giữa người và tinh tinh không có sự khác biệt về số lượng amino acid trong cytochrome C là bằng chứng chứng tỏ người và tinh tinh xuất phát từ một tổ tiên chung, nhưng thời gian tiến hóa chứa đủ lớn để để đột biến gene tạo ra sự khác biệt."],
        ans: [false, true, false, true]
    },
    {
        fullText: "Câu 3. Loài cá tuyết Nam cực (họ Channichthyidae) có hoạt động và trao đổi chất rất chậm. Chúng là nhóm động vật có xương sống duy nhất không chứa hồng cầu và sắc tố hemoglobin. Trong hệ gene của cá tuyết, gene β-globin và gene α-globin bị đột biến thành gene giả, không tham gia tổng hợp hemoglobin. Cá tuyết thuộc nhóm động vật biến nhiệt. Máu cá tuyết thiếu hemoglobin giúp có thích nghi tốt trong điều kiện vùng Nam cực nhiệt độ lạnh ( -20C và nồng độ O2 cao. Cá tuyết thu nhận O2 chủ yếu bằng cơ chế khuếch tán trực tiếp vào máu. Cá tuyết có diện tích mang nhỏ nên hoạt động trao đổi khí chủ yếu qua da. Một lượng lớn mạch máu nhỏ dưới da giúp cá nhận đủ O2 để khuếch tán. Dựa vào thông tin trên, mỗi nhận định sau đây là Đúng hay Sai?",
        sub: ["a) Đây là bằng chứng sinh học phân tử chứng tỏ cá tuyết có nguồn gốc từ loài cá có hemogolbin.", "b) Nhiệt độ nước tăng thì nhiệt độ cơ thể cá tăng.", "c) Khi nhiệt độ thấp, độ nhớt của máu giảm, mất tế bào hồng cầu giúp điều hòa lại dòng chảy của máu.", "d) Nếu bắt cá tuyết con và nuôi ở vùng biển nhiệt đới cá tuyết có thể sống được nhưng nhiều đặc điểm hình thái sẽ bị thay đổi."],
        ans: [true, true, false, false]
    },
    {
        fullText: "Câu 1. Trên quần đảo Galapagos có 3 loài sẻ cùng ăn hạt: - Ở một hòn đảo (đảo chung) có cả 3 loài sẻ cùng sinh sống, kích thước mỏ của 3 loài này rất khác nhau nên chúng sử dụng các loại hạt có kích thước khác nhau, phù hợp với kích thước mỏ của mỗi loài. - Ở các hòn đảo khác (các đảo riêng), mỗi hòn đảo chỉ có một trong ba loài sẻ này sinh sống, kích thước mỏ của các cá thể thuộc mỗi loài lại khác với kích thước mỏ của các cá thể cùng loài đang sinh sống ở hòn đảo chung. Theo học thuyết Darwin , mỗi nhận định sau là đúng hay sai?",
        sub: ["a) Kích thước mỏ có sự thay đổi bởi áp lực chọn lọc tự nhiên dẫn đến giảm bớt sự cạnh tranh giữa 3 loài sẻ cùng sống ở hòn đảo chung.", "b) Sự phân li ổ sinh thái dinh dưỡng của 3 loài sẻ trên hòn đảo chung giúp chúng có thể chung sống với nhau.", "c) Kích thước khác nhau của các loại hạt mà 3 loài sẻ này sử dụng làm thức ăn ở hòn đảo chung là nguyên nhân trực tiếp gây ra những biến đổi về kích thước mỏ của cả 3 loài sẻ.", "d) Sự khác biệt về kích thước mỏ giữa các cá thể đang sinh sống ở hòn đảo chung so với các cá thể cùng loài đang sinh sống ở hòn đảo riêng là kết quả của quá trình chọn lọc tự nhiên theo các hướng khác nhau."],
        ans: [true, true, false, true]
    },
    {
        fullText: "Câu 2. Trong rừng cây bạch dương ở vùng Manchester (Anh), có loài bướm sâu đo Biston betularia có màu trắng chiếm ưu thế, nhưng khi công nghiệp phát triển khói bụi gây ô nhiễm thì người ta thấy xuất hiện bướm đen với số lượng ngày càng nhiều. Khi giải thích về sự xuất hiện bướm sâu đo bạch dương màu đen, theo thuyết tiến hoá của Darwin, mỗi nhận định sau đây là Đúng hay Sai?",
        sub: ["a) Biến dị màu đen ở bướm sâu đo bạch dương đã xuất hiện một cách ngẫu nhiên từ trước trong quần thể ban đầu.", "b) Khi môi trường sống thay đổi là thân cây bạch dương bị nhuộm đen do khói bụi than thì biến dị màu đen là biến dị có lợi và được chọn lọc tự nhiên giữa lại.", "c) Khi thân cây bạch dương bị nhuộm đen do khói bụi than, nhiều cá thể bướm đã sử dụng thức ăn bị nhuộm đen nên đã làm cho cơ thể bị nhuộm đen.", "d) Môi trường sống là các thân cây bạch dương bị nhuộm đen đã làm phát sinh các biến dị cá thể có màu đen trên cơ thể sâu đo bạch dương."],
        ans: [true, true, false, false]
    },
    {
        fullText: "Câu 3. Hình bên mô tả về độ cao mỏ khác nhau giữa các nhóm cá thể của 2 loài chim ăn hạt và thuộc quần đảo Galapagos qua thời gian dài trong 2 trường hợp: Khi sống chung trên một đảo (hình A) và sống riêng trên 2 đảo (Hình B, C). Biết rằng độ cao mỏ chim có mối tương quan thuận với kích thước hạt. Theo lí thuyết mỗi phát biểu sau đây về 2 loài là đúng hay sai?",
        sub: ["a) Khi sống riêng, loài G.fortis có độ cao mỏ rất khác biệt so với loài G. fuliginosa.", "b) Khi sống chung, loài G.fortis thích nghi với ăn hạt to, loài G. fuliginosa thích nghi với ăn hạt nhỏ.", "c) Khi sống chung sự cạnh tranh về thức ăn là nguyên nhân chính gây ra sự phân hoá về độ cao mỏ giữa 2 loài.", "d) Khi sống riêng, loài G. fuliginosa có sự đa dạng về độ cao mỏ lớn hơn so với loài G.fortis."],
        ans: [false, true, true, false]
    },
    {
        fullText: "Câu 1. Người ta đã dùng một loại thuốc xịt muỗi mới để diệt muỗi. Việc xịt muỗi được lặp lại vài tháng một lần. Lần xịt đầu tiên đã diệt được gần như hết các con muỗi nhưng sau đó thì quần thể muỗi cứ tăng dần kích thước. Mỗi lần xịt sau đó chỉ diệt được rất ít muỗi. Mỗi nhận định sau đây là đúng hay sai về những điều đã xảy ra?",
        sub: ["a) Quần thể muỗi vốn đa dạng về kiểu gene, kiểu hình nên khi xịt thuốc đã có những kiểu gene thích nghi nên không bị đào thải.", "b) Việc xịt muỗi gây ra sự chọn lọc, từ đó làm tăng tần số allele kháng thuốc trong quần thể.", "c) Loài muỗi mới có khả năng kháng thuốc đã di cư tới vùng đó thay thế cho loài đã bị diệt.", "d) Thuốc diệt muỗi đã tác động tới DNA của muỗi để tạo nên muỗi có gene kháng thuốc."],
        ans: [true, true, false, false]
    },
    {
        fullText: "Câu 2. Ở quần đảo Galapagos thuộc vùng Nam Mỹ, loài chim sẻ Geospiza fortis có kích thước mỏ đa dạng và phù hợp với các loại hạt cây mà chúng ăn: chim sẻ có mỏ nhỏ thường ăn hạt nhỏ, mềm; chim sẻ có mỏ lớn ăn các hạt to, cứng. Trong một nghiên cứu, kích thước mỏ trung bình của quần thể chim sẻ đo được năm 1976 là 9,4 mm. Năm 1977, một đợt hạn hán kéo dài làm phần lớn các cây có hạt nhỏ, mềm bị chết do chịu hạn kém. Trong thời gian đó, khoảng 80% chim sẻ bị chết, chủ yếu là chim ăn hạt nhỏ, mềm có mỏ nhỏ. Đến năm 1978, quần thể chim sẻ này có kích thước mỏ trung bình là 10,2 mm. Mỗi nhận định sau đây là đúng hay sai về loài chim sẻ này?",
        sub: ["a) Kích thước khác nhau của các loại hạt mà các loài chim sẻ sử dụng làm thức ăn ở trên quần đảo là nguyên nhân trực tiếp gây ra biến đổi về kích thước mỏ.", "b) Tiến hoá đang diễn ra ở quần thể chim sẻ trên đảo Galapagos. Qua thời gian, có sự thay đổi tần số allele và tần số kiểu gene dẫn đến sự thay đổi trong đặc điểm di truyền của quần thể.", "c) Chim sẻ có đặc điểm thích nghi liên quan đến kích thước mỏ và đặc điểm thích nghi này có tính hợp lí tương đối.", "d) Nếu hiện tượng mưa nhiều xuất hiện trở lại ở khu vực này, cây có hạt nhỏ, mềm sinh trưởng trở lại, các chim sẻ có kích thước mỏ nhỏ sẽ có lợi thế sinh tồn hơn. Do đó, sau một vài năm, kích thước mỏ trung bình của quần thể chim sẻ sẽ giảm xuống gần với mức ban đầu hoặc thậm chí thấp hơn nếu chọn lọc tự nhiên tiếp tục diễn ra."],
        ans: [false, true, true, true]
    },
    {
        fullText: "Câu 3. Trong một cánh rừng gần khu công nghiệp, khói đen từ các nhà máy làm thay đổi môi trường trong rừng. Khi theo dõi ảnh hưởng của ô nhiễm môi trường trong cảnh rừng đối với sự hình thành đặc điểm thích nghi (màu sắc thân) của một loài bướm, đối chứng là khu vực rừng cách xa nhà máy, các nhà khoa học thu được số liệu như trong Bảng 17.1. Các phát biểu sau đây về bảng số liệu này là Đúng hay Sai?",
        table: `<table><tr><th>Khu vực thí nghiệm</th><th>Bướm sáng (%)</th><th>Bướm tối (%)</th></tr><tr><td>Rừng không bị ô nhiễm</td><td>13,7</td><td>86,3</td></tr><tr><td>Rừng bị ô nhiễm</td><td>74,1</td><td>25,9</td></tr></table>`,
        sub: ["a) Ở cánh rừng không bị ô nhiễm, chim ăn thịt các loại bướm như nhau.", "b) Chim dùng thị giác để tìm kiếm thức ăn.", "c) Trong khu rừng bị ô nhiêm, bướm có màu sắc tối có nhiều ưu thể về sống sót và sinh sản hơn.", "d) Khi rừng bị ô nhiễm, quần thể bướm tăng cường tạo ra cac biến dị màu sắc thân tối nhiều hơn thân có màu sắc sáng."],
        ans: [false, true, true, true]
    },
    {
        fullText: "Câu 1. Khi nói về nguồn gốc của sự sống, các phát biểu sau đây đúng hay sai?",
        sub: ["a) Sự sống được phát sinh qua các giai đoạn theo trình tự sau: Tiến hoá hoá học → Tiến hoá sinh học → Tiến hoá tiền sinh học.", "b) Tiến hoá hoá học là giai đoạn hình thành nên những tế bào sống đầu tiên.", "c) Tiến hoá tiền sinh học là giai đoạn hình thành nên các tế bào sơ khai (protobiont).", "d) Tiến hoá sinh học được diễn ra cho đến ngày nay hình thành nên các loài sinh vật và không chịu tác động của các nhân tố tiến hoá."],
        ans: [false, false, true, false]
    },
    {
        fullText: "Câu 2. Khi nói về tiến hóa hóa học, các phát biểu sau đây đúng hay sai?",
        sub: ["a) Quá trình hình thành các chất hữu cơ bằng con đường hóa học mới chỉ là giả thuyết, chưa được chứng minh bằng thực nghiệm.", "b) Do tác dụng của các nguồn năng lượng tự nhiên mà từ các chất vô cơ hình thành nên những hợp chất hữu cơ đơn giản đến phức tạp như amino acid, nucleotide.", "c) Các hợp chất hữu cơ càng phức tạp sẽ càng nặng, theo các cơn mưa kéo dài hàng nghìn năm thuở đó mà rơi xuống biển.", "d) Có sự tổng hợp các chất hữu cơ từ các chất vô cơ theo phương thức hóa học."],
        ans: [false, true, true, true]
    },
    {
        fullText: "Câu 3. Khi nói về các giai đoạn tiến hóa, cho biết các nhận định nào sau đây đúng hay sai?",
        sub: ["a) Sự xuất hiện của các hợp chất hữu cơ trong các thiên thạch chứng tỏ quá trình tiến hóa hóa học có thể xảy ra ở ngoài Trái Đất.", "b) Việc tìm kiếm sự sống trên các hành tinh khác dựa trên giả thuyết về tiến hóa hóa học.", "c) Tiến hóa hóa học và tiến hóa sinh học là hai quá trình hoàn toàn độc lập.", "d) Các chất hữu cơ đơn giản chỉ có thể được tạo ra trong phòng thí nghiệm."],
        ans: [true, true, false, false]

let currentIdx = 0;

function render() {
    const area = document.getElementById('quiz-area');
    const item = data[currentIdx];
    document.getElementById('progress').innerText = `Câu ${currentIdx + 1} / ${data.length}`;
    
    let html = `<div class="question-box active">
        <div class="full-question-text">${item.fullText}</div>
        ${item.table || ''}
        <div class="options-container">`;
    
    item.sub.forEach((s, i) => {
        html += `<div class="option-card"><p>${s}</p>
        <div class="btn-group">
            <button class="btn-true" onclick="check(${i}, true, this)">ĐÚNG</button>
            <button class="btn-false" onclick="check(${i}, false, this)">SAI</button>
        </div></div>`;
    });
    html += `</div></div>`;
    area.innerHTML = html;
    document.getElementById('msg').innerText = "";
}

function check(subIdx, val, btn) {
    const correct = data[currentIdx].ans[subIdx] === val;
    if(correct) {
        btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
        btn.style.boxShadow = "0 0 15px gold";
        btn.style.opacity = "1";
        checkFinish();
    } else {
        document.getElementById('msg').innerText = "Sai rồi! Hãy chọn lại ý này.";
        btn.style.background = "#000";
        setTimeout(() => {
            btn.style.background = val ? "#2ecc71" : "#e74c3c";
            document.getElementById('msg').innerText = "";
        }, 700);
    }
}

function checkFinish() {
    const btns = document.querySelectorAll('.btn-group button:disabled');
    if(btns.length === data[currentIdx].sub.length * 2) {
        document.getElementById('msg').style.color = "#2ecc71";
        document.getElementById('msg').innerText = "CHÍNH XÁC! Chuyển câu tiếp theo...";
        setTimeout(() => {
            currentIdx++;
            if(currentIdx < data.length) render();
            else document.getElementById('quiz-container').innerHTML = "<h1>HOÀN THÀNH BÀI TẬP!</h1><p style='text-align:center'>Bạn đã hoàn thành xuất sắc.</p>";
        }, 1500);
    }
}

render();
</script>
