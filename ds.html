<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Đúng Sai Sinh Học</title>
    <style>
        :root {
            --nasa-blue: #0b3d91;
            --nasa-red: #fc3d21;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }

        #quiz-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            max-width: 900px;
            width: 100%;
        }

        h1 { color: var(--nasa-blue); text-align: center; border-bottom: 3px solid var(--nasa-blue); padding-bottom: 10px; text-transform: uppercase; }

        .question-box { display: none; margin-bottom: 20px; }
        .active { display: block; animation: slideIn 0.4s ease-out; }

        .progress-bar { font-weight: bold; color: #666; margin-bottom: 10px; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #fff;
            overflow: hidden;
            border-radius: 8px;
        }

        table, th, td { border: 1px solid #dee2e6; text-align: center; padding: 12px; }
        th { background-color: var(--nasa-blue); color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }

        .desc-text { background: #e9ecef; padding: 15px; border-left: 5px solid var(--nasa-blue); border-radius: 4px; margin: 15px 0; font-style: italic; }

        .options-grid { display: grid; gap: 20px; margin-top: 20px; }
        .option-item { background: #fff; border: 1px solid #e0e0e0; padding: 15px; border-radius: 10px; transition: 0.3s; }
        .option-item:hover { border-color: var(--nasa-blue); }

        .btn-group { display: flex; gap: 15px; margin-top: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }

        .btn-true { background: #28a745; color: white; }
        .btn-false { background: #dc3545; color: white; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        #result-area { text-align: center; font-size: 1.2rem; font-weight: bold; margin-top: 20px; min-height: 30px; color: var(--nasa-red); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>Hệ thống Trắc nghiệm Đúng/Sai - Sinh học 12</h1>
    <div id="progress" class="progress-bar"></div>
    <div id="questions-wrapper"></div>
    <div id="result-area"></div>
</div>

let currentIdx = 0;

function renderQuestion() {
    const wrapper = document.getElementById('questions-wrapper');
    wrapper.innerHTML = '';
    const data = quizData[currentIdx];
    
    document.getElementById('progress').innerText = `Câu hỏi: ${currentIdx + 1} / ${quizData.length}`;
    
    const qDiv = document.createElement('div');
    qDiv.className = 'question-box active';
    
    let html = `<h3>${data.q}</h3>`;
    if (data.desc) html += `<div class="desc-text">${data.desc}</div>`;
    if (data.table) html += data.table;
    
    html += `<div class="options-grid">`;
    data.subQs.forEach((sub, sIdx) => {
        html += `
            <div class="option-item">
                <p>${sub}</p>
                <div class="btn-group">
                    <button class="btn-true" onclick="checkSub(${sIdx}, true, this)">ĐÚNG</button>
                    <button class="btn-false" onclick="checkSub(${sIdx}, false, this)">SAI</button>
                </div>
            </div>`;
    });
    html += `</div>`;
    
    qDiv.innerHTML = html;
    wrapper.appendChild(qDiv);
    document.getElementById('result-area').innerText = "";
}

function checkSub(subIdx, userVal, btn) {
    const correct = quizData[currentIdx].answers[subIdx];
    const parent = btn.parentElement;

    if (userVal === correct) {
        btn.style.boxShadow = "0 0 15px #28a745";
        Array.from(parent.children).forEach(b => b.disabled = true);
        checkNextStep();
    } else {
        btn.style.background = "#000";
        document.getElementById('result-area').innerText = "SAI RỒI! Hãy chọn lại ý này.";
        setTimeout(() => {
            btn.style.background = userVal ? "#28a745" : "#dc3545";
            document.getElementById('result-area').innerText = "";
        }, 800);
    }
}

function checkNextStep() {
    const activeBox = document.querySelector('.question-box');
    const total = activeBox.querySelectorAll('.btn-group').length;
    const disabled = activeBox.querySelectorAll('button:disabled').length / 2;

    if (disabled === total) {
        document.getElementById('result-area').style.color = "#28a745";
        document.getElementById('result-area').innerText = "TUYỆT VỜI! Đang chuyển sang câu tiếp theo...";
        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                renderQuestion();
            } else {
                document.getElementById('questions-wrapper').innerHTML = "<h2 style='text-align:center;'>BẠN ĐÃ HOÀN THÀNH TẤT CẢ CÂU HỎI!</h2>";
                document.getElementById('result-area').innerText = "Dữ liệu xác nhận: Bạn là thiên tài Sinh học!";
            }
        }, 1500);
    }
}

// Khởi chạy
renderQuestion();
</script>
