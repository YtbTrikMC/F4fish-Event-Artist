<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Nghe Tiếng Anh 12 - NTT</title>
    <style>
        /* CSS giữ nguyên như bản trước */
        :root {
            --primary-color: #0b3d91;
            --accent-color: #00ffcc;
            --bg-dark: #0b192e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #b0c4de;
            --danger: #fc3d21;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
            overflow-x: hidden;
            display: none; /* Ẩn toàn bộ nội dung cho đến khi nhập đúng pass */
        }

        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--accent-color); margin-bottom: 30px; }
        header h1 { color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 1.5rem; }
        .controls-global { position: sticky; top: 10px; z-index: 1000; display: flex; justify-content: center; margin-bottom: 25px; }
        .btn { padding: 12px 25px; border-radius: 30px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .btn-stop { background: var(--danger); color: white; box-shadow: 0 4px 15px rgba(252, 61, 33, 0.4); }
        .btn-play { background: var(--accent-color); color: #0b192e; font-size: 0.75rem; padding: 8px 15px; }
        .part-box { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 20px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .part-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .part-title { font-size: 1.1rem; color: var(--accent-color); font-weight: bold; flex: 1; }
        .content-text { color: var(--text-dim); font-size: 1rem; white-space: pre-wrap; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; }
        .speaker { color: #f1c40f; font-weight: bold; }
        .reading { border: 1px solid var(--accent-color); background: rgba(0, 255, 204, 0.08); }
        footer { text-align: center; margin-top: 40px; padding: 20px; font-size: 0.75rem; opacity: 0.5; }
    </style>

    <script>
        // HỆ THỐNG KIỂM TRA MẬT KHẨU
        (function() {
            const password = prompt("Hệ thống bảo mật: Vui lòng nhập mật khẩu để truy cập bài nghe:");
            if (password === "LISTENING12A1") {
                alert("Mật khẩu chính xác! Chào mừng bạn.");
                // Cho phép hiển thị nội dung trang
                document.addEventListener("DOMContentLoaded", function() {
                    document.body.style.display = "block";
                });
            } else {
                alert("Mật khẩu sai! Bạn sẽ được đưa quay lại trang chủ.");
                window.location.href = "index.html"; // Chuyển về trang chủ
            }
        })();
    </script>
</head>
<body>

<div class="container">
    <header>
        <h1>ENGLISH 12 - LISTENING</h1>
        <p style="font-size: 0.9rem; margin-top: 5px;">Hệ thống luyện nghe tự động - NTT</p>
    </header>

    <div class="controls-global">
        <button class="btn btn-stop" onclick="stopAudio()">■ DỪNG ĐỌC</button>
    </div>

    <div id="listening-content"></div>

    <footer>Thiết kế bởi NTT@THPTLTV-2026</footer>
</div>

<script>
    // Phần nội dung dữ liệu và logic đọc giữ nguyên như cũ
    const synth = window.speechSynthesis || null;
    const data = [
        { title: "Part 1: Wildlife Conservation Trip", text: `Lisa: Hey, I was looking into different options for our wildlife conservation trip...` },
        { title: "Part 2: Endangered Species", text: `Good morning, everyone. Today, we're going to talk about endangered species...` },
        { title: "Part 3: Fake News", text: `Fake news is nothing new, but silly stories can reach more people...` },
        { title: "Part 4: Lifelong Learning", text: `The astonishing speed of technological development makes it necessary...` },
        { title: "Part 5: Career in Teaching", text: `Mai Chi: Good morning, Ms. Hoa. Do you have a few minutes?...` },
        { title: "Part 6: Job Interview", text: `Kathy Walker: Mr. Harris? Hi, I'm Kathy Walker. Would you like to come into the office?...` }
    ];

    // (Tôi lược bớt phần Text chi tiết bên trên để code gọn hơn, bạn hãy bê nguyên phần text đầy đủ của bản trước vào nhé)

    function init() {
        const wrapper = document.getElementById('listening-content');
        data.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'part-box';
            div.id = 'box-' + index;
            const formattedText = item.text.replace(/^([A-Za-z\s\.]+):/gm, '<span class="speaker">$1:</span>');
            div.innerHTML = `
                <div class="part-header">
                    <span class="part-title">${item.title}</span>
                    <button class="btn btn-play" onclick="playAudio(${index})">▶ NGHE ĐOẠN NÀY</button>
                </div>
                <div class="content-text">${formattedText}</div>
            `;
            wrapper.appendChild(div);
        });
    }

    function playAudio(index) {
        if (!synth) return;
        stopAudio(); 
        document.getElementById('box-' + index).classList.add('reading');
        const utterance = new SpeechSynthesisUtterance(data[index].text);
        utterance.lang = 'en-US';
        utterance.rate = 0.85; 
        utterance.onend = () => document.getElementById('box-' + index).classList.remove('reading');
        synth.speak(utterance);
    }

    function stopAudio() {
        if (synth) synth.cancel();
        document.querySelectorAll('.part-box').forEach(b => b.classList.remove('reading'));
    }

    window.onload = init;
</script>
</body>
</html>
